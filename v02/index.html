<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuida na Fuga</title>
    
    <meta name="theme-color" content="#FFD90F">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="volleyball.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap');
        
        :root { --homer-yellow: #FFD90F; --homer-blue: #0094DA; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; min-height: 100vh; padding-bottom: 90px; }

        .bg-homer { background: linear-gradient(180deg, #FFD90F 0%, #fbbf24 100%); }
        .glass-card { background: white; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255,255,255,0.7); }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px); border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around; padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
            z-index: 5000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; transition: 0.3s; width: 20%; }
        .nav-item.active { color: #0094DA; }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 9px; font-weight: 900; text-transform: uppercase; }

        .btn-homer { background: var(--homer-yellow); color: #1e3a8a; font-weight: 900; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border-bottom: 4px solid #d97706; }
        .btn-homer:active { transform: translateY(2px); border-bottom-width: 2px; }

        #view-login, #view-agenda, #view-event, #view-create, #view-profile, #loading-screen { display: none; }
        .active-view { display: block !important; }
        
        .role-badge { font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 900; text-transform: uppercase; }
        .diretoria-bg { background: #1e3a8a; color: white; }
    </style>
</head>
<body>

    <div id="loading-screen" class="fixed inset-0 bg-homer z-[9000] flex flex-col items-center justify-center text-blue-900">
        <div class="text-6xl animate-bounce mb-4">🍩</div>
        <p class="font-900 uppercase tracking-tighter italic">Cuida na Fuga...</p>
    </div>

    <header class="bg-homer pt-12 pb-16 rounded-b-[45px] px-8 relative shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="user-photo" src="https://upload.wikimedia.org/wikipedia/en/0/02/Homer_Simpson_2006.png" class="w-12 h-12 rounded-full border-4 border-white shadow-lg bg-white p-1">
                <div class="text-left">
                    <p class="text-[10px] font-black text-blue-900 uppercase opacity-60 leading-none">Salve,</p>
                    <p id="user-name-display" class="text-lg font-900 text-blue-900 leading-tight">Visitante</p>
                </div>
            </div>
            <div class="text-right">
                <span id="user-role-badge" class="role-badge bg-white text-blue-900 shadow-sm hidden">Diretoria</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5 -mt-8 relative z-20">

        <div id="view-login" class="text-center space-y-6 pt-10">
            <div class="glass-card p-10 space-y-6">
                <h2 class="text-3xl font-900 text-gray-800 uppercase italic leading-none">Bora fugir?</h2>
                <p class="text-sm text-gray-500 font-medium">Entra aí pra ver os próximos rolês da galera.</p>
                <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-100 py-4 rounded-2xl font-bold shadow-sm active:scale-95 transition-all">
                    <img src="https://www.google.com/favicon.ico" class="w-5"> Entrar com Google
                </button>
            </div>
        </div>

        <div id="view-agenda" class="space-y-4 animate-pop">
            <h3 class="text-xs font-900 text-blue-900 uppercase tracking-widest flex items-center gap-2 mb-2">
                <i class="fa-solid fa-calendar-days"></i> Próximas Fugas
            </h3>
            <div id="agenda-list" class="space-y-4">
                </div>
        </div>

        <div id="view-create" class="animate-pop">
            <div class="glass-card p-6">
                <h2 class="text-xl font-900 text-gray-800 mb-6 uppercase italic">Marcar Novo Rolê</h2>
                <form id="form-new-event" class="space-y-4">
                    <select id="new-category" class="w-full px-4 py-4 bg-gray-50 border-none rounded-2xl font-bold outline-none">
                        <option value="volei">🏐 Vôlei</option>
                        <option value="churrasco">🔥 Churrasco</option>
                        <option value="jogos">🎮 Games</option>
                        <option value="viagem">✈️ Viagem</option>
                    </select>
                    <input type="text" id="new-title" required class="w-full px-4 py-4 bg-gray-50 rounded-2xl font-bold outline-none" placeholder="Nome do Rolê">
                    <input type="text" id="new-address" required class="w-full px-4 py-4 bg-gray-50 rounded-2xl font-bold outline-none text-sm" placeholder="Endereço">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="datetime-local" id="new-date" required class="px-4 py-4 bg-gray-50 rounded-2xl text-[10px] font-bold outline-none">
                        <input type="number" id="new-total" required class="px-4 py-4 bg-gray-50 rounded-2xl font-bold outline-none" placeholder="Valor Total">
                    </div>
                    
                    <div id="diretoria-only-area" class="hidden flex items-center justify-between px-2 py-3 bg-blue-50 rounded-2xl border border-blue-100">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-user-shield text-blue-600"></i>
                            <span class="text-[10px] font-black text-blue-900 uppercase">Só pra Diretoria?</span>
                        </div>
                        <input type="checkbox" id="new-private" class="w-6 h-6 rounded-lg">
                    </div>

                    <button type="submit" class="w-full btn-homer py-5 mt-4 text-sm tracking-widest">Lançar a Braba 🚀</button>
                </form>
            </div>
        </div>

        <div id="view-event" class="animate-pop space-y-4">
            <div id="event-content"></div>
        </div>

    </main>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <button onclick="changeView('agenda')" class="nav-item active" id="nav-agenda">
            <i class="fa-solid fa-house"></i><span>Início</span>
        </button>
        <button onclick="changeView('create')" class="nav-item" id="nav-create">
            <i class="fa-solid fa-plus-circle"></i><span>Novo</span>
        </button>
        <button onclick="changeView('profile')" class="nav-item" id="nav-profile">
            <i class="fa-solid fa-user"></i><span>Perfil</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, query, where, onSnapshot, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw", authDomain: "volei-3f30d.firebaseapp.com", projectId: "volei-3f30d", storageBucket: "volei-3f30d.firebasestorage.app", messagingSenderId: "969073040869", appId: "1:969073040869:web:c0f6005d98fae4144de30c" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;

        // --- CONTROLE DE TELAS ---
        window.changeView = (viewId) => {
            document.querySelectorAll('main > div').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const view = document.getElementById(`view-${viewId}`);
            if(view) view.classList.add('active-view');
            
            const nav = document.getElementById(`nav-${viewId}`);
            if(nav) nav.classList.add('active');
            window.scrollTo(0,0);
        };

        // --- AUTH ---
        document.getElementById('btn-login-google').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                userData = { uid: user.uid, name: user.displayName, email: user.email, photo: user.photoURL };
                
                // Checar se é diretoria (Isso você define no banco manualmente na primeira vez)
                const userRef = doc(db, 'users', user.uid);
                onSnapshot(userRef, (snap) => {
                    const data = snap.data() || {};
                    userData.role = data.role || 'Geral';
                    updateHeader();
                    loadAgenda();
                    changeView('agenda');
                    document.getElementById('bottom-nav').classList.remove('hidden');
                });
            } else {
                changeView('login');
                document.getElementById('bottom-nav').classList.add('hidden');
            }
        });

        function updateHeader() {
            document.getElementById('user-name-display').innerText = userData.name.split(' ')[0];
            document.getElementById('user-photo').src = userData.photo;
            if(userData.role === 'Diretoria') {
                document.getElementById('user-role-badge').classList.remove('hidden');
                document.getElementById('diretoria-only-area').classList.remove('hidden');
            }
        }

        // --- AGENDA CENTRAL ---
        function loadAgenda() {
            // Se for diretoria vê tudo, se for geral não vê privados
            const fugasRef = collection(db, 'volei_events');
            const q = userData.role === 'Diretoria' 
                ? query(fugasRef) 
                : query(fugasRef, where('isPrivate', '==', false));

            onSnapshot(q, (snap) => {
                const list = document.getElementById('agenda-list');
                list.innerHTML = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "glass-card p-5 flex items-center gap-4 active:scale-95 transition-all cursor-pointer";
                    card.onclick = () => window.location.href = `?id=${docSnap.id}`;
                    
                    const icons = { volei: '🏐', churrasco: '🔥', jogos: '🎮', viagem: '✈️' };
                    card.innerHTML = `
                        <div class="text-3xl bg-gray-50 w-16 h-16 flex items-center justify-center rounded-2xl shadow-inner">
                            ${icons[d.category] || '😎'}
                        </div>
                        <div class="flex-1">
                            <h4 class="font-900 text-gray-800 uppercase italic leading-tight">${d.location}</h4>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">${new Date(d.datetime).toLocaleDateString('pt-BR')}</p>
                            ${d.isPrivate ? '<span class="role-badge diretoria-bg mt-1 inline-block">Privado</span>' : ''}
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-300"></i>
                    `;
                    list.appendChild(card);
                });
            });
        }

        // --- CRIAÇÃO ---
        document.getElementById('form-new-event').onsubmit = async (e) => {
            e.preventDefault();
            const id = Math.random().toString(36).substr(2, 2).toUpperCase() + Math.floor(1000 + Math.random() * 9000);
            const newEvent = {
                location: document.getElementById('new-title').value,
                address: document.getElementById('new-address').value,
                category: document.getElementById('new-category').value,
                datetime: document.getElementById('new-date').value,
                totalCost: parseFloat(document.getElementById('new-total').value),
                isPrivate: document.getElementById('new-private').checked,
                createdBy: userData.uid,
                participants: [], scoreA: 0, scoreB: 0
            };
            await setDoc(doc(db, 'volei_events', id), newEvent);
            window.location.href = `?id=${id}`;
        };

    </script>
</body>
</html>
