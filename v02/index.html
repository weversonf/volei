<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuida na Fuga</title>
    
    <meta name="theme-color" content="#FFD90F">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="volleyball.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap');
        
        :root { --homer-yellow: #FFD90F; --homer-blue: #0094DA; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f8fafc; 
            min-height: 100vh;
            padding-bottom: 80px; /* Espaço para a barra de baixo */
        }

        .bg-homer { background: linear-gradient(180deg, #FFD90F 0%, #fbbf24 100%); }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        
        /* Barra de Navegação Inferior */
        .bottom-nav {
            fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-lg border-t border-gray-100 
            flex justify-around items-center py-3 px-6 z-[4000] pb-safe;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .nav-item { flex flex-col items-center gap-1 text-gray-400 transition-all active:scale-90; }
        .nav-item.active { text-blue-600; }
        .nav-item i { text-xl; }
        .nav-item span { text-[10px] font-black uppercase tracking-tighter; }

        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        #create-view, #section-players, #section-teams, #section-score, #section-info, #loading-view { display: none; }
        .active-section { display: block !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-homer pt-12 pb-20 rounded-b-[40px] px-6 text-center relative shadow-lg">
        <div class="bg-white p-2 rounded-full w-16 h-16 mx-auto mb-3 shadow-xl border-4 border-yellow-200 active:scale-90 transition-transform cursor-pointer" onclick="window.location.href=window.location.pathname">
            <img src="https://upload.wikimedia.org/wikipedia/en/0/02/Homer_Simpson_2006.png" class="w-full h-full object-contain">
        </div>
        <h1 class="text-2xl font-900 text-blue-900 uppercase italic tracking-tighter" id="header-title">Cuida na Fuga</h1>
        <div id="game-badge" class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-2xl font-black text-xs shadow-xl border-2 border-white hidden">
            CÓDIGO: <span id="display-game-id" class="font-mono">--</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5 -mt-10 relative z-20">
        
        <div id="loading-view" class="text-center py-20">
            <div class="text-5xl animate-bounce">🍩</div>
        </div>

        <div id="create-view" class="space-y-4 animate-pop">
            <div class="glass-card p-6 border-b-4 border-blue-100">
                <p class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">Já tem o código?</p>
                <div class="flex gap-2">
                    <input type="text" id="input-search-id" class="flex-1 px-4 py-3 bg-gray-50 rounded-2xl outline-none font-mono font-bold uppercase" placeholder="AB1234">
                    <button id="btn-search-id" class="bg-blue-600 text-white font-black px-6 rounded-2xl shadow-lg active:scale-95">IR</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-xl font-900 text-gray-800 mb-5 uppercase italic">Novo Rolê</h2>
                <form id="create-form" class="space-y-4">
                    <select id="input-category" class="w-full px-4 py-4 bg-gray-50 border-none rounded-2xl font-bold text-sm outline-none">
                        <option value="volei">🏐 Vôlei do Racha</option>
                        <option value="churrasco">🔥 Churrascão</option>
                        <option value="jogos">🎮 Noite de Games</option>
                        <option value="viagem">✈️ Partiu Viagem</option>
                    </select>
                    <input type="text" id="input-location" required class="w-full px-4 py-4 bg-gray-50 rounded-2xl font-bold outline-none" placeholder="Nome do Evento">
                    <input type="text" id="input-address" required class="w-full px-4 py-4 bg-gray-50 rounded-2xl font-bold text-sm outline-none" placeholder="Endereço">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="datetime-local" id="input-datetime" required class="px-4 py-4 bg-gray-50 rounded-2xl text-[10px] font-bold outline-none">
                        <input type="number" step="0.01" id="input-total" required class="px-4 py-4 bg-gray-50 rounded-2xl font-bold text-sm outline-none" placeholder="Total R$">
                    </div>
                    <button type="submit" class="w-full bg-yellow-400 text-blue-900 font-900 py-5 rounded-3xl shadow-xl uppercase tracking-widest mt-4 active:scale-95 transition-all">Cuida na Fuga! 🚀</button>
                </form>
            </div>
        </div>

        <div id="section-players" class="animate-pop space-y-4">
            <div class="glass-card p-5 flex justify-between items-center bg-blue-600 text-white border-none">
                <div><p class="text-[9px] font-black uppercase opacity-70">Por Cabeça</p><p class="text-3xl font-900" id="display-person-cost">R$ 0,00</p></div>
                <div class="text-right"><p class="text-[9px] font-black uppercase opacity-70">Confirmados</p><p class="text-xl font-900" id="display-count">0</p></div>
            </div>
            
            <div class="glass-card p-6">
                <ul id="participants-list" class="space-y-3 mb-6"></ul>
                <div class="flex gap-2 border-t pt-5">
                    <input type="text" id="input-name" class="flex-1 px-4 py-3 bg-gray-100 rounded-xl outline-none font-bold" placeholder="Teu nome...">
                    <button id="btn-join" class="bg-green-500 text-white font-black px-5 rounded-xl shadow-md"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </div>

        <div id="section-teams" class="animate-pop space-y-4">
            <div class="glass-card p-6">
                <h3 class="text-lg font-900 mb-4 uppercase italic">Dividir Times</h3>
                <select id="players-per-team" class="w-full mb-4 px-4 py-3 bg-gray-100 rounded-xl font-bold outline-none">
                    <option value="2">2x2</option><option value="4">4x4</option><option value="6" selected>6x6</option><option value="colher">Colher de Chá (5x4)</option>
                </select>
                <button onclick="window.drawTeams()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase italic tracking-widest"><i class="fa-solid fa-shuffle mr-2"></i> Sortear</button>
                <div id="teams-result" class="mt-6 space-y-3"></div>
            </div>
        </div>

        <div id="section-score" class="animate-pop text-center space-y-4">
            <div class="glass-card p-6">
                <div class="flex justify-between items-center mb-6 bg-gray-50 p-2 rounded-xl border">
                    <span class="text-[10px] font-black text-gray-400">FECHA EM:</span>
                    <select id="config-max-score" class="bg-transparent font-black text-blue-600 outline-none"><option value="15">15</option><option value="21">21</option></select>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1">
                        <input type="text" id="name-team-a" class="w-full text-center font-black text-[10px] uppercase mb-2 outline-none" value="TIME A">
                        <div class="text-6xl font-900 mb-4" id="score-a">0</div>
                        <div class="flex gap-1"><button onclick="updateScore('A', -1)" class="bg-gray-100 flex-1 py-3 rounded-lg">-</button><button onclick="updateScore('A', 1)" class="bg-green-500 text-white flex-[2] py-3 rounded-lg shadow-lg">+</button></div>
                    </div>
                    <div class="font-black text-gray-200">VS</div>
                    <div class="flex-1">
                        <input type="text" id="name-team-b" class="w-full text-center font-black text-[10px] uppercase mb-2 outline-none" value="TIME B">
                        <div class="text-6xl font-900 mb-4" id="score-b">0</div>
                        <div class="flex gap-1"><button onclick="updateScore('B', -1)" class="bg-gray-100 flex-1 py-3 rounded-lg">-</button><button onclick="updateScore('B', 1)" class="bg-blue-600 text-white flex-[2] py-3 rounded-lg shadow-lg">+</button></div>
                    </div>
                </div>
                <button onclick="resetScore()" class="mt-8 text-[9px] font-black text-gray-400 uppercase tracking-widest">Zerar Partida</button>
            </div>
        </div>

        <div id="section-info" class="animate-pop space-y-4">
            <div class="glass-card p-6">
                <h3 class="text-lg font-900 mb-4 uppercase italic">Local e Links</h3>
                <p class="text-sm font-bold text-gray-600 mb-6 flex items-start gap-2"><i class="fa-solid fa-map-pin text-red-500 mt-1"></i> <span id="display-address">...</span></p>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <a id="link-maps" target="_blank" class="bg-gray-50 p-4 rounded-2xl text-center shadow-sm active:scale-95"><i class="fa-solid fa-location-dot text-blue-600 text-2xl"></i><p class="text-[9px] font-black mt-1">MAPS</p></a>
                    <a id="link-waze" target="_blank" class="bg-gray-50 p-4 rounded-2xl text-center shadow-sm active:scale-95"><i class="fa-brands fa-waze text-cyan-500 text-2xl"></i><p class="text-[9px] font-black mt-1">WAZE</p></a>
                </div>
                <button id="btn-share" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase italic"><i class="fa-solid fa-share-nodes mr-2"></i> Mandar pro Grupo</button>
            </div>
        </div>

    </main>

    <nav class="bottom-nav hidden" id="main-nav">
        <button onclick="showSection('players')" class="nav-item active" id="nav-players">
            <i class="fa-solid fa-users"></i><span>Galera</span>
        </button>
        <button onclick="showSection('teams')" class="nav-item hidden" id="nav-teams">
            <i class="fa-solid fa-shuffle"></i><span>Times</span>
        </button>
        <button onclick="showSection('score')" class="nav-item hidden" id="nav-score">
            <i class="fa-solid fa-trophy"></i><span>Placar</span>
        </button>
        <button onclick="showSection('info')" class="nav-item" id="nav-info">
            <i class="fa-solid fa-circle-info"></i><span>Info</span>
        </button>
    </nav>

    <div id="toast" class="toast fixed bottom-24 left-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl text-xs font-black uppercase flex items-center gap-3">
        <span id="toast-msg">Mensagem</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, increment, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw", authDomain: "volei-3f30d.firebaseapp.com", projectId: "volei-3f30d", storageBucket: "volei-3f30d.firebasestorage.app", messagingSenderId: "969073040869", appId: "1:969073040869:web:c0f6005d98fae4144de30c" };
        let db, auth, currentEventId, localEventData;
        const urlParams = new URLSearchParams(window.location.search);
        const rawId = urlParams.get('id');
        if (rawId) { currentEventId = (rawId.length === 6) ? rawId.toUpperCase() : rawId; }

        // --- NAVEGAÇÃO ---
        window.showSection = (name) => {
            document.querySelectorAll('main > div').forEach(d => d.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-blue-600'));
            
            document.getElementById(`section-${name}`).classList.add('active-section');
            document.getElementById(`nav-${name}`).classList.add('active', 'text-blue-600');
            window.scrollTo(0,0);
        };

        // --- FIREBASE ---
        const init = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getFirestore(app);
            try { await enableIndexedDbPersistence(db); } catch(e){}
            await signInAnonymously(auth);
            
            if(currentEventId) {
                document.getElementById('loading-view').classList.add('active-section');
                onSnapshot(doc(db, 'volei_events', currentEventId), (s) => {
                    if(!s.exists()) { window.location.href = window.location.pathname; return; }
                    localEventData = s.data(); renderEvent(localEventData);
                    document.getElementById('loading-view').classList.remove('active-section');
                    document.getElementById('main-nav').classList.remove('hidden');
                    document.getElementById('game-badge').classList.remove('hidden');
                    if(!document.querySelector('.active-section')) showSection('players');
                });
            } else {
                document.getElementById('create-view').classList.add('active-section');
            }
        };

        const renderEvent = (d) => {
            document.getElementById('header-title').innerText = d.location;
            document.getElementById('display-game-id').innerText = currentEventId;
            document.getElementById('display-address').innerText = d.address;
            
            // Lógica de abas do vôlei
            const isVolei = d.category === 'volei';
            document.getElementById('nav-teams').classList.toggle('hidden', !isVolei);
            document.getElementById('nav-score').classList.toggle('hidden', !isVolei);

            const enc = encodeURIComponent(d.address);
            document.getElementById('link-maps').href = `https://www.google.com/maps/search/?api=1&query=$00{enc}`;
            document.getElementById('link-waze').href = `https://waze.com/ul?q=${enc}`;
            
            const p = d.participants || [];
            document.getElementById('display-person-cost').innerText = `R$ ${(d.totalCost / Math.max(1, p.length)).toFixed(2)}`;
            document.getElementById('display-count').innerText = p.length;
            
            document.getElementById('participants-list').innerHTML = p.map(u => `
                <li class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <span class="font-black text-gray-700 uppercase text-xs">${u.name}</span>
                    <button onclick="removePlayer('${u.entryId}')" class="text-red-200 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </li>
            `).join('') || '<p class="text-center text-gray-400 font-bold italic py-4">Cuida... cadê o povo?</p>';

            document.getElementById('score-a').innerText = d.scoreA || 0;
            document.getElementById('score-b').innerText = d.scoreB || 0;
        };

        // --- SORTEIO ---
        window.drawTeams = () => {
            const mode = document.getElementById('players-per-team').value;
            let p = [...localEventData.participants].map(x => x.name);
            p.sort(() => Math.random() - 0.5);
            const res = document.getElementById('teams-result'); res.innerHTML = '';
            
            const addTeam = (name, members, color) => {
                const div = document.createElement('div');
                div.className = `glass-card p-4 border-l-8 border-${color}-500 shadow-sm animate-pop`;
                div.innerHTML = `<p class="text-[10px] font-black text-${color}-600 uppercase mb-2">${name}</p>
                                 <div class="space-y-1">${members.map(m => `<p class="font-bold text-xs uppercase">• ${m}</p>`).join('')}</div>`;
                res.appendChild(div);
            };

            if(mode === 'colher') {
                if(p.length < 9) return showToast("Precisa de 9 hum!");
                addTeam("Time A (Vantagem)", p.splice(0, 5), "yellow");
                addTeam("Time B", p.splice(0, 4), "blue");
            } else {
                const n = parseInt(mode); let count = 1;
                while(p.length >= n) { addTeam(`Time ${count}`, p.splice(0, n), count % 2 === 0 ? "blue" : "yellow"); count++; }
            }
            if(p.length > 0) addTeam("Reservas", p, "gray");
        };

        // --- ACTIONS ---
        window.updateScore = async (team, amt) => {
            const field = team === 'A' ? 'scoreA' : 'scoreB';
            let cur = (localEventData[field] || 0) + amt;
            const max = parseInt(document.getElementById('config-max-score').value);
            if(cur >= max) { await updateDoc(doc(db, 'volei_events', currentEventId), { scoreA:0, scoreB:0, setsA: increment(1) }); }
            else { await updateDoc(doc(db, 'volei_events', currentEventId), { [field]: Math.max(0, cur) }); }
        };

        window.resetScore = async () => { if(confirm("Zerar?")) await updateDoc(doc(db, 'volei_events', currentEventId), { scoreA:0, scoreB:0 }); };
        window.removePlayer = async (id) => { const p = localEventData.participants.find(x => x.entryId === id); await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayRemove(p) }); };
        
        document.getElementById('btn-join').onclick = async () => {
            const n = document.getElementById('input-name').value.trim();
            if(!n) return;
            await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayUnion({ entryId: Math.random().toString(36).substr(2,9), name: n }) });
            document.getElementById('input-name').value = '';
        };

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = Math.random().toString(36).substr(2, 2).toUpperCase() + Math.floor(1000 + Math.random() * 9000);
            await setDoc(doc(db, 'volei_events', id), {
                location: document.getElementById('input-location').value,
                address: document.getElementById('input-address').value,
                category: document.getElementById('input-category').value,
                totalCost: parseFloat(document.getElementById('input-total').value),
                participants: [], scoreA: 0, scoreB: 0
            });
            window.location.href = `?id=${id}`;
        };

        document.getElementById('btn-share').onclick = () => { navigator.clipboard.writeText(window.location.href); showToast("Copiado! 🍩"); };
        document.getElementById('btn-search-id').onclick = () => { const id = document.getElementById('input-search-id').value.trim().toUpperCase(); if(id) window.location.href = `?id=${id}`; };
        const showToast = (m) => { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
        
        init();
    </script>
</body>
</html>
