<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuida na Fuga v10.1</title>
    <meta name="theme-color" content="#FFD90F">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --homer-yellow: #FFD90F; --homer-blue: #0094DA; }
        
        /* Fonte Fredoka aplicada globalmente */
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #f8fafc; 
            min-height: 100vh; 
            padding-bottom: 100px; 
            -webkit-tap-highlight-color: transparent;
        }

        .bg-homer { background: linear-gradient(180deg, #FFD90F 0%, #fbbf24 100%); }
        .glass-card { background: white; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255,255,255,0.7); }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 12px 10px calc(12px + env(safe-area-inset-bottom)); z-index: 5000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; transition: 0.3s; flex: 1; border: none; background: none; outline: none !important; }
        .nav-item.active { color: #0094DA; }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        #view-login, #view-agenda, #view-event, #view-create, #view-users, #view-profile, #loading-screen { display: none; }
        .active-view { display: block !important; }
        .active-flex { display: flex !important; }

        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-btn-active { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; border-width: 2px; }

        input, select, textarea { font-family: 'Fredoka', sans-serif !important; }
        
        /* Ajuste do Donuts da Imagem que você enviou */
        .donut-loader { font-size: 80px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
    </style>
</head>
<body>

    <div id="loading-screen" class="fixed inset-0 bg-homer z-[9000] flex flex-col items-center justify-center active-flex">
        <div class="donut-loader animate-bounce mb-4">🍩</div>
        <p class="font-700 uppercase tracking-widest italic text-white text-lg">Cuida na Fuga...</p>
    </div>

    <header id="main-header" class="bg-homer pt-12 pb-16 rounded-b-[45px] px-8 relative shadow-lg hidden">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer active:scale-95 transition-all" onclick="window.changeView('profile')">
                <div class="w-12 h-12 rounded-full border-4 border-white shadow-lg bg-white overflow-hidden">
                    <img id="user-photo" src="https://upload.wikimedia.org/wikipedia/en/0/02/Homer_Simpson_2006.png" class="w-full h-full object-cover">
                </div>
                <div class="text-left">
                    <p class="text-[10px] font-700 text-blue-900 uppercase opacity-60 leading-none">Salve,</p>
                    <p id="user-name-display" class="text-xl font-700 text-blue-900 leading-tight">...</p>
                </div>
            </div>
            <span id="user-role-badge" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-700 uppercase hidden">Diretoria</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5 -mt-8 relative z-20">
        <div id="view-login" class="pt-10">
            <div class="glass-card p-8 space-y-6 text-center border-b-4 border-yellow-400 mt-12">
                <h2 class="text-3xl font-700 text-gray-800 uppercase italic leading-none">Bora fugir?</h2>
                <form id="form-login" class="space-y-4">
                    <input type="text" id="input-user" placeholder="USUÁRIO" class="w-full p-4 bg-gray-50 rounded-2xl font-600 border-2 border-gray-100 text-center uppercase outline-none">
                    <input type="password" id="input-pass" placeholder="SENHA" class="w-full p-4 bg-gray-50 rounded-2xl font-600 border-2 border-gray-100 text-center outline-none">
                    <button class="w-full bg-blue-600 text-white font-700 py-4 rounded-2xl shadow-lg uppercase tracking-wider">Entrar</button>
                </form>
            </div>
        </div>

        <div id="view-agenda" class="space-y-4 animate-pop">
            <h3 class="text-xs font-700 text-blue-900 uppercase ml-1">📅 Próximos Rolês</h3>
            <div id="agenda-list" class="space-y-3"></div>
        </div>

        </main>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <button onclick="window.goHome()" class="nav-item active" id="nav-agenda"><i class="fa-solid fa-calendar-days"></i><span>Agenda</span></button>
        <button onclick="window.changeView('create')" class="nav-item" id="nav-create"><i class="fa-solid fa-circle-plus"></i><span>Lançar</span></button>
        <button onclick="window.changeView('profile')" class="nav-item" id="nav-profile"><i class="fa-solid fa-user-astronaut"></i><span>Perfil</span></button>
        <button onclick="window.changeView('users')" class="nav-item hidden" id="nav-users"><i class="fa-solid fa-users-gear"></i><span>Galera</span></button>
    </nav>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-[10px] font-700 uppercase opacity-0 transition-all pointer-events-none z-[7000]">Mensagem</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw", authDomain: "volei-3f30d.firebaseapp.com", projectId: "volei-3f30d", storageBucket: "volei-3f30d.firebasestorage.app", messagingSenderId: "969073040869", appId: "1:969073040869:web:c0f6005d98fae4144de30c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        let userData = null;

        // Função de segurança para remover o loading se nada acontecer em 5 segundos
        const hideLoading = () => {
            const screen = document.getElementById('loading-screen');
            if (screen) screen.classList.remove('active-flex');
        };

        window.changeView = (v) => {
            document.querySelectorAll('main > div').forEach(x => x.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            const view = document.getElementById(`view-${v}`);
            if(view) view.classList.add('active-view');
            const nav = document.getElementById(`nav-${v}`);
            if(nav) nav.classList.add('active');
            window.scrollTo(0,0);
        };

        window.goHome = () => window.changeView('agenda');

        const init = () => {
            // Backup: Se o Firebase travar, remove o loading depois de um tempo
            const safetyTimeout = setTimeout(hideLoading, 5000);

            auth.onAuthStateChanged(u => {
                const sess = localStorage.getItem('cuida_session');
                
                if(sess) {
                    // Se há sessão mas não há auth anônima, loga primeiro
                    if(!u) { 
                        auth.signInAnonymously().catch(() => hideLoading()); 
                        return; 
                    }

                    // Busca dados do usuário
                    db.collection('app_users').doc(sess).onSnapshot(s => {
                        clearTimeout(safetyTimeout);
                        hideLoading(); // REMOVE O LOADING AQUI

                        if(s.exists()){
                            userData = s.data(); userData.uid = s.id;
                            document.getElementById('main-header').classList.remove('hidden');
                            document.getElementById('bottom-nav').classList.remove('hidden');
                            document.getElementById('user-name-display').innerText = userData.name.split(' ')[0];
                            
                            const isDir = userData.role === 'Diretoria';
                            document.getElementById('nav-users').classList.toggle('hidden', !isDir);
                            
                            // Carrega a agenda por padrão
                            loadAgenda();
                            if(!window.location.search.includes('id')) window.changeView('agenda');
                        } else {
                            window.logout();
                        }
                    }, err => {
                        console.error(err);
                        hideLoading();
                    });
                } else {
                    hideLoading();
                    window.changeView('login');
                }
            });
        };

        // ... Restante das funções (loadAgenda, loadEventData, logout, etc.) ...
        // Certifique-se de que a função logout limpa tudo:
        window.logout = () => { 
            localStorage.removeItem('cuida_session'); 
            auth.signOut().then(() => location.reload()); 
        };

        document.getElementById('form-login').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('input-user').value.toLowerCase().trim();
            const p = document.getElementById('input-pass').value.trim();
            
            db.collection('app_users').doc(u).get().then(s => {
                if(s.exists() && s.data().password === p) { 
                    localStorage.setItem('cuida_session', u); 
                    auth.signInAnonymously().then(() => location.reload());
                } else {
                    alert("Dados incorretos!");
                }
            });
        };

        function loadAgenda() {
            db.collection('volei_events').onSnapshot(snap => {
                const list = document.getElementById('agenda-list'); 
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = "glass-card p-4 flex items-center gap-4 active:scale-95 cursor-pointer animate-pop";
                    el.onclick = () => { /* lógica de carregar evento */ };
                    el.innerHTML = `<div class="text-2xl bg-gray-50 w-14 h-14 flex items-center justify-center rounded-2xl border">🍩</div><div class="flex-1"><h4 class="font-700 text-gray-800 uppercase text-xs truncate">${d.location}</h4><p class="text-[9px] font-bold text-gray-400 uppercase">Ver detalhes</p></div>`;
                    list.appendChild(el);
                });
            });
        }

        init();
    </script>
</body>
</html>
