<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuida na Fuga v22 - Homer Edition</title>
    
    <meta name="theme-color" content="#FFD90F">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --homer-yellow: #FFD90F; --homer-blue: #0094DA; --duff-red: #D61B22; }
        
        body { 
            font-family: 'Fredoka', sans-serif; 
            background-color: var(--homer-yellow); 
            background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.4) 0%, transparent 40%);
            min-height: 100vh; 
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 3px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); border-radius: 20px; }
        .btn-homer { border: 3px solid #000; box-shadow: 4px 4px 0px #000; transition: all 0.1s; }
        .btn-homer:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        
        /* Views */
        #agenda-view, #create-view, #event-view, #loading-view, #modal-note { display: none; }
        .active-view { display: block !important; }
        .active-flex { display: flex !important; }
        
        /* Duff Animation */
        .duff-label { background: var(--duff-red); border: 2px solid black; color: white; font-weight: 900; padding: 0 4px; border-radius: 4px; font-size: 10px; transform: rotate(-10deg); }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 4px solid #000; display: flex; justify-content: space-around; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); z-index: 5000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #000; flex: 1; border: none; background: none; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--homer-blue); }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        .tab-btn-active { background: var(--homer-blue) !important; color: white !important; border-color: #000 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-900 pb-28">

    <div id="loading-view" class="active-view flex flex-col items-center justify-center pt-20">
        <div class="relative mb-4 scale-150">
            <i class="fa-solid fa-beer-mug-empty text-6xl text-amber-500 animate-bounce"></i>
            <div class="absolute top-6 left-1 duff-label">DUFF</div>
        </div>
        <p class="text-black font-black uppercase tracking-tighter text-xl drop-shadow-sm">Segura a Duff...</p>
    </div>

    <header class="pt-8 pb-4 text-center relative z-10">
        <div class="flex flex-col items-center justify-center gap-1">
            <div class="bg-white border-4 border-black p-2 rounded-full mb-2 shadow-lg">
                <span class="text-4xl">🍩</span>
            </div>
            <h1 class="text-4xl font-black text-black uppercase italic tracking-tighter drop-shadow-sm" onclick="window.navTo('home')">
                Cuida na Fuga
            </h1>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 relative z-10">
        
        <div id="agenda-view" class="space-y-6">
            <div class="glass-card p-5">
                <h3 class="text-[10px] font-black text-blue-600 uppercase mb-2">Buscar Código</h3>
                <div class="flex gap-2">
                    <input type="text" id="input-search-id" class="flex-1 px-4 py-3 bg-white border-2 border-black rounded-xl outline-none uppercase font-mono font-bold" placeholder="EX: XS4567">
                    <button onclick="window.searchEvent()" class="btn-homer bg-blue-500 text-white px-5 rounded-xl font-bold"><i class="fa-solid fa-search"></i></button>
                </div>
            </div>

            <div id="agenda-list" class="space-y-3"></div>
        </div>

        <div id="create-view" class="space-y-6">
            <div class="glass-card p-7">
                <h2 class="text-2xl font-black text-black mb-6 uppercase italic border-b-4 border-black pb-2">Novo Rolê</h2>
                <form id="create-form" class="space-y-4">
                    <select id="input-category" required class="w-full px-4 py-4 bg-white border-2 border-black rounded-xl font-black text-sm outline-none">
                        <option value="" disabled selected>O QUE VAMOS FAZER?</option>
                        <option value="volei">🏐 VÔLEI</option>
                        <option value="churrasco">🔥 CHURRASCO</option>
                        <option value="passeio">🚗 PASSEIO / VIAGEM</option>
                        <option value="jogos">🎮 NOITE DE JOGOS</option>
                    </select>

                    <input type="text" id="input-location" required class="w-full px-4 py-4 border-2 border-black rounded-xl font-bold outline-none" placeholder="Nome do Local">
                    <input type="text" id="input-address" required class="w-full px-4 py-4 border-2 border-black rounded-xl font-bold outline-none text-sm" placeholder="Endereço">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input type="datetime-local" id="input-datetime" required class="w-full px-4 py-4 border-2 border-black rounded-xl font-bold text-[10px]">
                        <input type="number" step="0.01" id="input-total" required class="w-full px-4 py-4 border-2 border-black rounded-xl font-bold" placeholder="Custo Fixo R$">
                    </div>
                    
                    <div class="flex items-center justify-between p-2">
                        <label class="text-xs font-black uppercase">Sem Limite?</label>
                        <input type="checkbox" id="check-unlimited" checked class="w-6 h-6 border-2 border-black accent-blue-600">
                    </div>
                    
                    <input type="number" min="2" id="input-limit" class="w-full px-4 py-4 bg-gray-100 border-2 border-black rounded-xl font-bold opacity-60" placeholder="Máximo de Pessoas" disabled>
                    
                    <button type="submit" class="w-full btn-homer bg-green-500 text-white font-black py-5 rounded-xl uppercase tracking-widest text-sm">LANÇAR A BRABA! 🚀</button>
                </form>
            </div>
        </div>

        <div id="event-view" class="space-y-4">
            <div class="glass-card p-6 relative overflow-hidden">
                <h2 id="display-title" class="text-2xl font-black text-black uppercase italic leading-none mb-1">...</h2>
                <p id="display-address" class="text-[10px] font-bold text-gray-600 uppercase mb-4">...</p>
                
                <div class="bg-blue-600 border-4 border-black p-4 flex justify-between items-center text-white">
                    <div><p class="text-[8px] font-black opacity-80 uppercase">Total</p><p class="font-black text-lg" id="display-total-cost">R$ 0,00</p></div>
                    <div class="text-right"><p class="text-[8px] font-black opacity-80 uppercase" id="label-per-person">Cota</p><p class="font-black text-yellow-400 text-2xl" id="display-person-cost">R$ 0,00</p></div>
                </div>
            </div>

            <div id="tab-bar" class="flex gap-2 overflow-x-auto no-scrollbar p-1">
                <button onclick="window.switchTab('players')" id="tab-btn-players" class="flex-1 py-3 px-4 glass-card text-[10px] font-black uppercase tab-btn-active">Galera</button>
                <button onclick="window.switchTab('finance')" id="tab-btn-finance" class="flex-1 py-3 px-4 glass-card text-[10px] font-black uppercase hidden">Gastos</button>
                <button onclick="window.switchTab('teams')" id="tab-btn-teams" class="flex-1 py-3 px-4 glass-card text-[10px] font-black uppercase">Sorteio</button>
                <button onclick="window.switchTab('score')" id="tab-btn-score" class="flex-1 py-3 px-4 glass-card text-[10px] font-black uppercase">Placar</button>
            </div>

            <div id="tab-content-players" class="tab-view block space-y-3">
                <div class="glass-card p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black uppercase italic">Confirmados</h3>
                        <span id="display-count" class="bg-black text-white px-3 py-1 rounded-full text-xs font-black">0</span>
                    </div>
                    <ul id="participants-list" class="space-y-2 mb-6"></ul>
                    
                    <div id="area-check-churras" class="hidden items-center justify-between p-3 bg-amber-100 border-2 border-black rounded-xl mb-3">
                        <span class="text-[10px] font-black uppercase">Entrar na cota (Carne/Beer)?</span>
                        <input type="checkbox" id="check-churras" checked class="w-5 h-5 accent-red-600">
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="input-name" class="flex-1 px-4 py-3 border-2 border-black rounded-xl font-bold uppercase text-sm" placeholder="TEU NOME...">
                        <button onclick="window.joinGame()" class="btn-homer bg-green-500 text-white px-6 rounded-xl font-black text-xl">+</button>
                    </div>
                </div>
            </div>

            <div id="tab-content-finance" class="tab-view hidden space-y-3">
                <div class="glass-card p-5">
                    <h3 class="font-black uppercase italic mb-4">Notas Fiscais</h3>
                    <div id="list-receipts" class="space-y-2 mb-4"></div>
                    <button onclick="window.openNoteModal()" class="w-full btn-homer bg-blue-500 text-white font-black py-4 rounded-xl uppercase text-xs">Lançar Compra</button>
                </div>
            </div>

            <div id="tab-content-teams" class="tab-view hidden space-y-4">
                <div class="glass-card p-5">
                    <select id="players-per-team" class="w-full p-3 border-2 border-black rounded-xl font-black mb-4">
                        <option value="6">6x6</option><option value="5">5x5</option><option value="4">4x4</option><option value="colher">Colher (5x4)</option>
                    </select>
                    <button onclick="window.drawTeams()" class="w-full btn-homer bg-blue-600 text-white font-black py-4 rounded-xl uppercase italic">Embaralhar!</button>
                    <div id="teams-result" class="mt-4 space-y-3"></div>
                </div>
            </div>

            <div id="tab-content-score" class="tab-view hidden text-center">
                <div class="glass-card p-6">
                    <div class="flex justify-around items-center mb-8">
                        <div>
                            <p class="text-[10px] font-black text-blue-600 uppercase">Sets: <span id="sets-a">0</span></p>
                            <div class="text-6xl font-black my-2" id="score-a">0</div>
                            <button onclick="window.updateScore('A', 1)" class="btn-homer bg-green-500 text-white w-14 h-14 rounded-full font-black text-2xl">+</button>
                        </div>
                        <div class="font-black text-2xl">VS</div>
                        <div>
                            <p class="text-[10px] font-black text-red-600 uppercase">Sets: <span id="sets-b">0</span></p>
                            <div class="text-6xl font-black my-2" id="score-b">0</div>
                            <button onclick="window.updateScore('B', 1)" class="btn-homer bg-blue-500 text-white w-14 h-14 rounded-full font-black text-2xl">+</button>
                        </div>
                    </div>
                    <button onclick="window.resetScore()" class="text-[10px] font-black opacity-30 uppercase">Zerar Partida</button>
                </div>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="bottom-nav">
        <button id="nav-btn-home" onclick="window.navTo('home')" class="nav-item active">
            <i class="fa-solid fa-calendar-alt"></i><span>Agenda</span>
        </button>
        <button id="nav-btn-create" onclick="window.navTo('create')" class="nav-item">
            <i class="fa-solid fa-plus-circle"></i><span>Lançar</span>
        </button>
        <button id="nav-btn-event" onclick="window.navTo('event')" class="nav-item">
            <i class="fa-solid fa-beer-mug-empty"></i><span>O Rolê</span>
        </button>
    </nav>

    <div id="modal-note" class="fixed inset-0 z-[6000] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-6 space-y-4">
            <h3 class="text-xl font-black uppercase italic">Lançar Nota</h3>
            <input type="text" id="note-title" class="w-full p-4 border-2 border-black rounded-xl font-bold" placeholder="O que comprou?">
            <input type="number" step="0.01" id="note-val" class="w-full p-4 border-2 border-black rounded-xl font-bold" placeholder="Valor R$">
            <div class="flex gap-2">
                <button onclick="window.closeNoteModal()" class="flex-1 font-black uppercase text-xs">Sair</button>
                <button onclick="window.saveNote()" class="flex-[2] btn-homer bg-blue-500 text-white font-black py-4 rounded-xl uppercase">Salvar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast fixed bottom-28 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full font-black uppercase text-[10px] tracking-widest shadow-2xl">MENSAGEM</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, increment, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw", authDomain: "volei-3f30d.firebaseapp.com", projectId: "volei-3f30d", storageBucket: "volei-3f30d.firebasestorage.app", messagingSenderId: "969073040869", appId: "1:969073040869:web:c0f6005d98fae4144de30c" };
        let db, auth, localEventData;
        
        window.currentEventId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('id')) { window.currentEventId = urlParams.get('id').toUpperCase(); }

        const views = { loading: document.getElementById('loading-view'), agenda: document.getElementById('agenda-view'), create: document.getElementById('create-view'), event: document.getElementById('event-view') };

        window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };

        window.navTo = (target) => {
            Object.values(views).forEach(v => v.style.display = 'none');
            ['nav-btn-home', 'nav-btn-create', 'nav-btn-event'].forEach(b => document.getElementById(b).classList.remove('active'));
            if (target === 'home') { views.agenda.style.display = 'block'; document.getElementById('nav-btn-home').classList.add('active'); }
            else if (target === 'create') { views.create.style.display = 'block'; document.getElementById('nav-btn-create').classList.add('active'); }
            else { if(localEventData) { views.event.style.display = 'block'; document.getElementById('nav-btn-event').classList.add('active'); } else { views.agenda.style.display = 'block'; window.showToast("Nenhum rolê ativo!"); } }
            window.scrollTo(0,0);
        };

        const init = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getFirestore(app);
            try { await enableIndexedDbPersistence(db); } catch(e){}
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => {
                if(!u) return;
                loadAgenda();
                if(window.currentEventId) {
                    onSnapshot(doc(db, 'volei_events', window.currentEventId), (s) => {
                        if(!s.exists()) { window.showToast("CÓDIGO INVÁLIDO!"); window.navTo('home'); return; }
                        localEventData = s.data(); renderEvent(localEventData);
                        views.loading.style.display = 'none'; window.navTo('event');
                    });
                } else { views.loading.style.display = 'none'; window.navTo('home'); }
            });
        };

        const loadAgenda = () => {
            onSnapshot(collection(db, 'volei_events'), (snap) => {
                const list = document.getElementById('agenda-list'); list.innerHTML = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const icons = { churrasco:'🔥', volei:'🏐', passeio:'🚗', jogos:'🎮' };
                    const card = document.createElement('div');
                    card.className = "glass-card p-4 flex items-center gap-4 active:scale-95 cursor-pointer";
                    card.onclick = () => { window.location.href = `?id=${docSnap.id}`; };
                    card.innerHTML = `<div class="text-3xl">${icons[d.category]||'🍩'}</div><div class="flex-1"><h4 class="font-black uppercase text-xs truncate">${d.location}</h4><p class="text-[9px] font-bold opacity-50 uppercase">${d.datetime?new Date(d.datetime).toLocaleString('pt-BR'):'...'}</p></div><i class="fa-solid fa-chevron-right text-xs"></i>`;
                    list.appendChild(card);
                });
            });
        };

        const renderEvent = (d) => {
            document.getElementById('display-title').innerText = d.location;
            document.getElementById('display-address').innerText = d.address;
            document.getElementById('display-game-id').innerText = window.currentEventId;
            const cat = d.category || 'volei';
            
            // Abas Dinâmicas
            const isVolei = cat === 'volei';
            document.getElementById('tab-btn-teams').style.display = isVolei ? 'block' : 'none';
            document.getElementById('tab-btn-score').style.display = isVolei ? 'block' : 'none';
            document.getElementById('tab-btn-finance').style.display = !isVolei ? 'block' : 'none';
            document.getElementById('area-check-churras').style.display = (cat === 'churrasco' || cat === 'viagem') ? 'flex' : 'none';

            // Financeiro
            const p = d.participants || [], receipts = d.receipts || [];
            const totalRec = receipts.reduce((a, b) => a + b.value, 0);
            const totalGlobal = (d.totalCost || 0) + totalRec;
            document.getElementById('display-total-cost').innerText = `R$ ${totalGlobal.toFixed(2)}`;
            
            let pagantes = p.length;
            if(cat === 'churrasco' || cat === 'viagem') pagantes = p.filter(u => u.churras).length;
            document.getElementById('display-person-cost').innerText = `R$ ${(totalGlobal / Math.max(1, pagantes)).toFixed(2)}`;
            document.getElementById('label-per-person').innerText = (cat === 'churrasco' || cat === 'viagem') ? 'Cota' : 'Por Pessoa';

            // Listas
            document.getElementById('display-count').innerText = p.length;
            document.getElementById('participants-list').innerHTML = p.map(u => `<li class="flex items-center justify-between p-3 bg-white/50 border-2 border-black rounded-xl"><div class="flex items-center gap-2"><span class="font-black uppercase text-xs">${u.name}</span>${u.churras?'<span class="text-[8px] bg-red-600 text-white px-1 rounded">BEER</span>':''}</div><button onclick="window.removePlayer('${u.entryId}')" class="text-red-600"><i class="fa-solid fa-trash"></i></button></li>`).join('');
            document.getElementById('list-receipts').innerHTML = receipts.map(r => `<div class="flex items-center justify-between p-2 border-b-2 border-black font-bold text-xs"><p>${r.title}</p><span class="text-blue-600">R$ ${r.value.toFixed(2)}</span></div>`).join('');
            
            document.getElementById('score-a').innerText = d.scoreA || 0; document.getElementById('score-b').innerText = d.scoreB || 0;
            document.getElementById('sets-a').innerText = d.setsA || 0; document.getElementById('sets-b').innerText = d.setsB || 0;
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('#tab-bar button').forEach(b => b.classList.remove('tab-btn-active'));
            document.getElementById(`tab-content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tab}`).classList.add('tab-btn-active');
        };

        window.searchEvent = () => { const id = document.getElementById('input-search-id').value.trim().toUpperCase(); if(id) window.location.href = `?id=${id}`; };
        window.joinGame = async () => {
            const i = document.getElementById('input-name'); const n = i.value.trim().toUpperCase(); if(!n) return;
            const entryId = Math.random().toString(36).substr(2, 9);
            const isChurras = document.getElementById('check-churras').checked;
            await updateDoc(doc(db, 'volei_events', window.currentEventId), { participants: arrayUnion({ entryId, name: n, churras: isChurras }) });
            i.value = ''; window.showToast("DENTRO! 🚀");
        };

        window.removePlayer = async (id) => { const p = localEventData.participants.find(x => x.entryId === id); await updateDoc(doc(db, 'volei_events', window.currentEventId), { participants: arrayRemove(p) }); };
        window.updateScore = async (t, a) => { const f = t==='A'?'scoreA':'scoreB'; await updateDoc(doc(db, 'volei_events', window.currentEventId), { [f]: increment(a) }); };
        window.resetScore = async () => { if(confirm("Zerar?")) await updateDoc(doc(db, 'volei_events', window.currentEventId), { scoreA:0, scoreB:0, setsA:0, setsB:0 }); };
        
        window.openNoteModal = () => document.getElementById('modal-note').classList.add('active-flex');
        window.closeNoteModal = () => document.getElementById('modal-note').classList.remove('active-flex');
        window.saveNote = async () => {
            const t = document.getElementById('note-title').value, v = parseFloat(document.getElementById('note-val').value);
            if(!t || !v) return;
            await updateDoc(doc(db, 'volei_events', window.currentEventId), { receipts: arrayUnion({ id: Date.now(), title: t, value: v }) });
            window.closeNoteModal();
        };

        window.drawTeams = () => {
            let p = [...localEventData.participants].map(x => x.name).sort(() => Math.random() - 0.5);
            const res = document.getElementById('teams-result'); res.innerHTML = '';
            const n = parseInt(document.getElementById('players-per-team').value);
            let count = 1;
            while(p.length >= n) {
                const card = document.createElement('div'); card.className = "p-3 bg-white border-2 border-black rounded-xl";
                card.innerHTML = `<p class="text-[10px] font-black uppercase mb-1">Time ${count}</p><p class="text-xs font-bold">${p.splice(0, n).join(', ')}</p>`;
                res.appendChild(card); count++;
            }
        };

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();
            const sid = Math.random().toString(36).substr(2, 6).toUpperCase();
            await setDoc(doc(db, 'volei_events', sid), {
                category: document.getElementById('input-category').value,
                location: document.getElementById('input-location').value,
                address: document.getElementById('input-address').value,
                totalCost: parseFloat(document.getElementById('input-total').value),
                participants: [], receipts: [], scoreA:0, scoreB:0, setsA:0, setsB:0, datetime: document.getElementById('input-datetime').value
            });
            window.location.href = `?id=${sid}`;
        };

        document.getElementById('check-unlimited').onchange = (e) => { document.getElementById('input-limit').disabled = e.target.checked; };

        init();
    </script>
</body>
</html>
