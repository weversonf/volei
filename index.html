<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vôlei v09</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(170deg, #38bdf8 0%, #0ea5e9 30%, #fde047 70%, #f97316 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #create-view, #event-view, #loading-view, #edit-modal { display: none; }

        .toast {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(150%) translateX(-50%);
            opacity: 0;
            z-index: 1000;
        }
        .toast.show { transform: translateY(0) translateX(-50%); opacity: 1; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 pb-12 overflow-x-hidden relative">

    <div class="fixed top-10 right-10 w-32 h-32 bg-yellow-300 rounded-full blur-2xl opacity-60 pointer-events-none animate-pulse-slow"></div>

    <header class="pt-10 pb-6 text-center relative z-10">
        <div class="flex items-center justify-center gap-3 px-4">
            <h1 class="text-3xl sm:text-4xl font-bold text-white drop-shadow-lg cursor-pointer transition-transform hover:scale-105 flex items-center" onclick="window.location.href=window.location.pathname">
                <i class="fa-solid fa-volleyball text-yellow-300 animate-float drop-shadow-md mr-3"></i> 
                <span id="main-title-text">Vôlei do Italo</span>
            </h1>
            <button id="btn-open-edit" class="hidden text-white/80 hover:text-white bg-white/20 hover:bg-white/40 w-10 h-10 rounded-full transition-all flex items-center justify-center shadow-sm backdrop-blur-sm shrink-0">
                <i class="fa-solid fa-pen text-sm"></i>
            </button>
        </div>
        <p class="text-sm text-white/90 font-medium mt-2 drop-shadow">Agende sua rede e divida a quadra</p>
    </header>

    <main class="max-w-md mx-auto px-4 relative z-10">
        
        <div id="loading-view" class="text-center py-20 animate-fade-in">
            <i class="fa-solid fa-volleyball animate-spin text-6xl text-white drop-shadow-lg" style="animation-duration: 1.5s;"></i>
            <p class="mt-6 text-white font-semibold tracking-wider">AQUECENDO...</p>
        </div>

        <div id="create-view" class="glass-card rounded-3xl p-7 animate-fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b border-gray-200/50 pb-3">Novo Jogo</h2>
            <form id="create-form" class="space-y-4">
                <input type="text" id="input-location" required class="w-full px-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:outline-none font-medium" placeholder="Nome do Jogo (Ex: Vôlei do Augusto)">
                <input type="text" id="input-address" required class="w-full px-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:outline-none" placeholder="Endereço para o GPS">
                <div class="grid grid-cols-2 gap-3">
                    <input type="datetime-local" id="input-datetime" required class="w-full px-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:outline-none text-sm">
                    <input type="number" step="0.01" id="input-total" required class="w-full px-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:outline-none" placeholder="Valor R$">
                </div>
                <div class="flex items-center justify-between px-1">
                    <label class="text-sm font-semibold text-gray-700">Limite de Pessoas</label>
                    <input type="checkbox" id="check-unlimited" checked class="w-5 h-5 text-orange-500">
                </div>
                <input type="number" min="2" id="input-limit" class="w-full px-4 py-3 bg-gray-100/50 border border-white/50 rounded-2xl opacity-60" placeholder="Máximo de pessoas" disabled>
                <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-4 rounded-2xl shadow-lg transform hover:scale-[1.02] transition-all uppercase tracking-widest">Criar Jogo</button>
            </form>
        </div>

        <div id="event-view" class="space-y-5 animate-fade-in">
            <div class="glass-card rounded-3xl p-6 relative">
                <button id="btn-share" class="absolute top-5 right-5 bg-white text-orange-500 p-3 rounded-full shadow-md w-12 h-12 flex items-center justify-center z-10"><i class="fa-solid fa-share-nodes"></i></button>
                <p class="text-sm text-gray-700 mb-4 pr-16 flex items-start gap-2 font-medium leading-relaxed" id="display-address-text">
                    <i class="fa-solid fa-location-dot mt-1 text-orange-500"></i> <span>Endereço...</span>
                </p>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <a id="link-maps" target="_blank" class="bg-white/60 py-2 rounded-xl text-xs font-bold text-blue-600 text-center shadow-sm border border-white/50">Google Maps</a>
                    <a id="link-waze" target="_blank" class="bg-white/60 py-2 rounded-xl text-xs font-bold text-cyan-500 text-center shadow-sm border border-white/50">Waze</a>
                </div>
                <div class="bg-gradient-to-r from-white/60 to-white/40 rounded-2xl p-4 flex justify-between items-center border border-white/60 shadow-inner">
                    <div><p class="text-[10px] text-gray-600 font-bold uppercase">Total</p><p class="font-bold text-gray-800" id="display-total-cost">R$ 0,00</p></div>
                    <div class="text-right"><p class="text-[10px] text-gray-600 font-bold uppercase">Por Pessoa</p><p class="font-black text-green-600 text-2xl" id="display-person-cost">R$ 0,00</p></div>
                </div>
            </div>

            <div class="flex p-1 bg-white/50 backdrop-blur-md rounded-2xl border border-white/50 shadow-sm">
                <button id="tab-btn-players" class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-white text-orange-600 shadow-sm transition-all">Jogadores</button>
                <button id="tab-btn-score" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500 transition-all">Placar</button>
            </div>

            <div id="tab-content-players" class="glass-card rounded-3xl p-6 block">
                <div class="flex justify-between items-end mb-5"><h3 class="text-xl font-bold text-gray-800">Confirmados</h3><span id="display-count" class="bg-orange-500 text-white text-sm font-bold px-3 py-1.5 rounded-xl">0</span></div>
                <div id="progress-container" class="w-full bg-white/50 rounded-full h-3 mb-5 hidden overflow-hidden shadow-inner"><div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full transition-all duration-500"></div></div>
                <ul id="participants-list" class="space-y-3 mb-6 max-h-[300px] overflow-y-auto pr-1"></ul>
                <div id="action-area" class="border-t border-gray-200/50 pt-5">
                    <div id="join-form-area" class="flex gap-2">
                        <input type="text" id="input-name" class="flex-1 px-4 py-3 bg-white/80 border border-white/50 rounded-2xl focus:outline-none" placeholder="Nome do jogador...">
                        <button id="btn-join" class="bg-green-500 text-white font-bold py-3 px-5 rounded-2xl shadow-md transform active:scale-95 transition-transform"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="full-area" class="hidden text-center p-4 bg-red-50 border border-red-200 rounded-2xl text-red-600 font-bold">Lista Cheia</div>
                </div>
            </div>

            <div id="tab-content-score" class="glass-card rounded-3xl p-6 hidden">
                <div class="flex flex-col gap-3 mb-6">
                    <div class="flex justify-between items-center bg-white/60 p-3 rounded-2xl border border-white/50">
                        <span class="text-xs font-bold text-gray-600 uppercase">Fecha set em:</span>
                        <select id="config-max-score" class="bg-white border rounded-xl px-2 py-1 text-sm font-black text-orange-600">
                            <option value="15">15 Pontos</option><option value="21">21 Pontos</option><option value="25">25 Pontos</option>
                        </select>
                    </div>
                    <button id="btn-voice" class="w-full bg-white/80 text-gray-700 font-bold py-3 rounded-2xl border border-gray-200 shadow-sm flex items-center justify-center gap-2 transition-all">
                        <i class="fa-solid fa-microphone-lines text-gray-400"></i>
                        <span>Ativar Juiz de Voz</span>
                    </button>
                </div>
                <div class="flex justify-between items-stretch gap-3 text-center">
                    <div class="flex-1 bg-white/60 rounded-2xl p-4 border border-white/50 relative shadow-sm">
                        <div class="text-[10px] font-bold text-gray-500 mb-2 uppercase">Sets: <span id="sets-a" class="text-orange-600">0</span></div>
                        <input type="text" id="name-team-a" class="w-full text-center bg-transparent font-bold text-xs border-b border-gray-300 pb-1 mb-3 uppercase focus:outline-none" value="VERMELHO">
                        <div class="text-6xl font-black text-gray-800 my-4" id="score-a">0</div>
                        <div class="flex gap-2"><button onclick="updateScore('A', -1)" class="flex-1 bg-red-100 text-red-600 py-3 rounded-xl">-</button><button onclick="updateScore('A', 1)" class="flex-[2] bg-green-500 text-white py-3 rounded-xl font-bold shadow-md">+</button></div>
                    </div>
                    <div class="flex items-center text-gray-300 font-black">X</div>
                    <div class="flex-1 bg-white/60 rounded-2xl p-4 border border-white/50 relative shadow-sm">
                        <div class="text-[10px] font-bold text-gray-500 mb-2 uppercase">Sets: <span id="sets-b" class="text-orange-600">0</span></div>
                        <input type="text" id="name-team-b" class="w-full text-center bg-transparent font-bold text-xs border-b border-gray-300 pb-1 mb-3 uppercase focus:outline-none" value="AZUL">
                        <div class="text-6xl font-black text-gray-800 my-4" id="score-b">0</div>
                        <div class="flex gap-2"><button onclick="updateScore('B', -1)" class="flex-1 bg-red-100 text-red-600 py-3 rounded-xl">-</button><button onclick="updateScore('B', 1)" class="flex-[2] bg-green-500 text-white py-3 rounded-xl font-bold shadow-md">+</button></div>
                    </div>
                </div>
                <div class="mt-6 text-center"><button onclick="resetScore()" class="text-[10px] font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest transition-colors"><i class="fa-solid fa-rotate-left mr-1"></i> Zerar Partida</button></div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 modal-overlay" id="modal-close-bg"></div>
        <div class="glass-card w-full max-w-sm rounded-3xl p-6 relative animate-pop shadow-2xl">
            <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-sliders text-orange-500"></i> Ajustar Detalhes
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nome do Jogo / Local</label>
                    <input type="text" id="modal-edit-title" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-orange-400 focus:outline-none font-semibold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Endereço (GPS)</label>
                    <input type="text" id="modal-edit-address" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-orange-400 focus:outline-none text-sm">
                </div>
                <div class="flex gap-2 pt-2">
                    <button id="modal-cancel" class="flex-1 py-3 font-bold text-gray-500 hover:text-red-500 transition-colors uppercase text-xs">Cancelar</button>
                    <button id="modal-save" class="flex-[2] bg-green-500 text-white font-bold py-3 rounded-2xl shadow-lg hover:bg-green-600 transition-all uppercase text-xs">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast fixed bottom-6 left-1/2 bg-gray-900/90 backdrop-blur-sm text-white px-5 py-3 rounded-2xl shadow-2xl text-sm flex items-center gap-3 font-medium border border-gray-700">
        <i class="fa-solid fa-bell text-orange-400 text-lg"></i>
        <span id="toast-msg">Mensagem</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, addDoc, getDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw",
            authDomain: "volei-3f30d.firebaseapp.com",
            projectId: "volei-3f30d",
            storageBucket: "volei-3f30d.firebasestorage.app",
            messagingSenderId: "969073040869",
            appId: "1:969073040869:web:c0f6005d98fae4144de30c"
        };

        let db, auth, currentUser, currentEventId, localEventData;
        const urlParams = new URLSearchParams(window.location.search);
        currentEventId = urlParams.get('id');

        const viewLoading = document.getElementById('loading-view');
        const viewCreate = document.getElementById('create-view');
        const viewEvent = document.getElementById('event-view');
        const editModal = document.getElementById('edit-modal');
        const toastEl = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        // FUNÇÕES GLOBAIS (CONECTADAS AOS BOTÕES DO HTML)
        window.updateScore = async (team, amt) => {
            if(!currentEventId || !localEventData) return;
            const field = team === 'A' ? 'scoreA' : 'scoreB';
            const setField = team === 'A' ? 'setsA' : 'setsB';
            let cur = (localEventData[field] || 0) + amt;
            if(cur < 0) cur = 0;
            
            const max = parseInt(document.getElementById('config-max-score').value);
            const other = team === 'A' ? (localEventData.scoreB || 0) : (localEventData.scoreA || 0);

            if(cur >= max && (cur - other) >= 2) {
                await updateDoc(doc(db, 'volei_events', currentEventId), { scoreA:0, scoreB:0, [setField]: increment(1) });
                showToast("Fim de Set!");
            } else {
                await updateDoc(doc(db, 'volei_events', currentEventId), { [field]: cur });
            }
        };

        window.resetScore = async () => {
            if(!currentEventId) return;
            if(confirm("Deseja ZERAR OS PONTOS E OS SETS desta partida?")) {
                try {
                    await updateDoc(doc(db, 'volei_events', currentEventId), {
                        scoreA: 0, scoreB: 0, setsA: 0, setsB: 0
                    });
                    showToast("Partida zerada!");
                } catch(e) { showToast("Erro ao zerar."); }
            }
        };

        window.removePlayer = async (id) => {
            const p = localEventData.participants.find(x => x.entryId === id);
            await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayRemove(p) });
        };

        // Modal Logic
        const openEdit = () => {
            document.getElementById('modal-edit-title').value = localEventData.location;
            document.getElementById('modal-edit-address').value = localEventData.address || '';
            editModal.style.display = 'flex';
        };
        const closeEdit = () => editModal.style.display = 'none';

        document.getElementById('modal-save').onclick = async () => {
            const newTitle = document.getElementById('modal-edit-title').value.trim();
            const newAddr = document.getElementById('modal-edit-address').value.trim();
            if(newTitle && currentEventId) {
                await updateDoc(doc(db, 'volei_events', currentEventId), { location: newTitle, address: newAddr });
                closeEdit();
                showToast("Alterado com sucesso!");
            }
        };
        document.getElementById('modal-cancel').onclick = closeEdit;
        document.getElementById('modal-close-bg').onclick = closeEdit;
        document.getElementById('btn-open-edit').onclick = openEdit;

        // Abas
        const switchTab = (tab) => {
            const isPlayers = tab === 'players';
            document.getElementById('tab-content-players').classList.toggle('hidden', !isPlayers);
            document.getElementById('tab-content-score').classList.toggle('hidden', isPlayers);
            document.getElementById('tab-btn-players').className = isPlayers ? 'flex-1 py-2.5 rounded-xl text-sm font-bold bg-white text-orange-600 shadow-sm' : 'flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500';
            document.getElementById('tab-btn-score').className = !isPlayers ? 'flex-1 py-2.5 rounded-xl text-sm font-bold bg-white text-orange-600 shadow-sm' : 'flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500';
        };
        document.getElementById('tab-btn-players').onclick = () => switchTab('players');
        document.getElementById('tab-btn-score').onclick = () => switchTab('score');

        // Firebase Logic
        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app); db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        if (currentEventId) loadEvent(currentEventId);
                        else showView('create');
                    }
                });
            } catch (e) { showToast("Erro no servidor."); }
        };

        const showView = (v) => {
            viewLoading.style.display = 'none';
            viewCreate.style.display = v === 'create' ? 'block' : 'none';
            viewEvent.style.display = v === 'event' ? 'block' : 'none';
            document.getElementById('btn-open-edit').classList.toggle('hidden', v !== 'event');
        };

        const loadEvent = (id) => {
            onSnapshot(doc(db, 'volei_events', id), (snap) => {
                if(!snap.exists()) return showView('create');
                localEventData = snap.data();
                renderEvent(localEventData);
                showView('event');
            });
        };

        const renderEvent = (data) => {
            document.getElementById('main-title-text').innerText = data.location;
            document.title = data.location;
            document.querySelector('#display-address-text span').innerText = data.address || 'Sem endereço';
            const encoded = encodeURIComponent(data.address);
            document.getElementById('link-maps').href = `https://www.google.com/maps/search/?api=1&query=${encoded}`;
            document.getElementById('link-waze').href = `https://waze.com/ul?q=${encoded}`;
            
            document.getElementById('display-total-cost').innerText = new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(data.totalCost);
            const p = data.participants || [];
            document.getElementById('display-person-cost').innerText = new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(data.totalCost / Math.max(1, p.length));
            document.getElementById('display-count').innerText = data.playerLimit ? `${p.length}/${data.playerLimit}` : p.length;
            
            if(data.playerLimit) {
                document.getElementById('progress-container').classList.remove('hidden');
                document.getElementById('progress-bar').style.width = Math.min(100, (p.length / data.playerLimit * 100)) + '%';
            } else {
                document.getElementById('progress-container').classList.add('hidden');
            }

            document.getElementById('participants-list').innerHTML = p.map((u) => `
                <li class="flex items-center justify-between p-3 bg-white/80 rounded-2xl shadow-sm animate-pop">
                    <span class="font-bold text-gray-700 ml-2 uppercase truncate">${u.name}</span>
                    <button onclick="removePlayer('${u.entryId}')" class="text-red-400 p-2 hover:text-red-600 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                </li>
            `).join('') || '<li class="text-center py-4 text-gray-400 text-sm italic">Nenhum jogador na lista.</li>';

            document.getElementById('score-a').innerText = data.scoreA || 0;
            document.getElementById('score-b').innerText = data.scoreB || 0;
            document.getElementById('sets-a').innerText = data.setsA || 0;
            document.getElementById('sets-b').innerText = data.setsB || 0;
        };

        // VOZ SYSTEM
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechRecognition) {
            const rec = new SpeechRecognition();
            rec.lang = 'pt-BR'; rec.continuous = true;
            rec.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
                const teamA = document.getElementById('name-team-a').value.toLowerCase();
                const teamB = document.getElementById('name-team-b').value.toLowerCase();
                if(text.includes('ponto') || text.includes('marca')) {
                    if(text.includes(teamA)) window.updateScore('A', 1);
                    else if(text.includes(teamB)) window.updateScore('B', 1);
                }
            };
            document.getElementById('btn-voice').onclick = () => {
                const btn = document.getElementById('btn-voice');
                if(btn.classList.contains('listening')) {
                    rec.stop(); btn.classList.remove('listening', 'bg-red-100', 'animate-pulse');
                    btn.querySelector('span').innerText = "Ativar Juiz de Voz";
                } else {
                    rec.start(); btn.classList.add('listening', 'bg-red-100', 'animate-pulse');
                    btn.querySelector('span').innerText = "Juiz Ouvindo...";
                }
            };
        }

        document.getElementById('btn-join').onclick = async () => {
            const n = document.getElementById('input-name').value.trim();
            if(n) {
                const entryId = Math.random().toString(36).substr(2, 9);
                await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayUnion({ entryId, name: n }) });
                document.getElementById('input-name').value = '';
            }
        };

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            try {
                const ref = await addDoc(collection(db, 'volei_events'), {
                    location: document.getElementById('input-location').value,
                    address: document.getElementById('input-address').value,
                    totalCost: parseFloat(document.getElementById('input-total').value),
                    playerLimit: document.getElementById('check-unlimited').checked ? 0 : parseInt(document.getElementById('input-limit').value),
                    participants: [], scoreA:0, scoreB:0, setsA:0, setsB:0, maxScore: 15, datetime: document.getElementById('input-datetime').value
                });
                window.location.href = `?id=${ref.id}`;
            } catch(err) { showToast("Erro ao criar."); btn.disabled = false; }
        };

        document.getElementById('btn-share').onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            showToast("Link copiado para o WhatsApp!");
        };

        const showToast = (m) => { 
            toastMsg.innerText = m; 
            toastEl.classList.add('show'); 
            setTimeout(() => toastEl.classList.remove('show'), 3000); 
        };

        init();
    </script>
</body>
</html>
