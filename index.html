<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vôlei do Italo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(170deg, #38bdf8 0%, #0ea5e9 30%, #fde047 70%, #f97316 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pulse-slow {
            animation: pulse 3s infinite;
        }

        #create-view, #event-view, #loading-view {
            display: none;
        }

        .toast {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(150%) translateX(-50%);
            opacity: 0;
        }
        .toast.show {
            transform: translateY(0) translateX(-50%);
            opacity: 1;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 pb-12 overflow-x-hidden relative">

    <div class="fixed top-10 right-10 w-32 h-32 bg-yellow-300 rounded-full blur-2xl opacity-60 pointer-events-none animate-pulse-slow"></div>

    <header class="pt-10 pb-6 text-center">
        <h1 class="text-4xl font-bold text-white drop-shadow-lg flex items-center justify-center gap-3 cursor-pointer transition-transform hover:scale-105" onclick="window.location.href=window.location.pathname">
            <i class="fa-solid fa-volleyball text-yellow-300 animate-float drop-shadow-md"></i> 
            Vôlei do Italo
        </h1>
        <p class="text-sm text-white/90 font-medium mt-2 drop-shadow">Agende sua rede e divida a quadra</p>
    </header>

    <main class="max-w-md mx-auto px-4 relative z-10">
        
        <div id="loading-view" class="text-center py-20 animate-fade-in">
            <div class="relative inline-block">
                <i class="fa-solid fa-volleyball animate-spin text-6xl text-white drop-shadow-lg" style="animation-duration: 1.5s;"></i>
            </div>
            <p class="mt-6 text-white font-semibold tracking-wider drop-shadow-md">AQUECENDO...</p>
        </div>

        <div id="create-view" class="glass-card rounded-3xl p-7 animate-fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center border-b border-gray-200/50 pb-3">
                <i class="fa-solid fa-plus-circle text-orange-500 mr-3"></i> Novo Jogo
            </h2>
            
            <form id="create-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1 ml-1">Nome do Local</label>
                    <div class="relative group">
                        <i class="fa-solid fa-umbrella-beach absolute left-4 top-3.5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        <input type="text" id="input-location" required class="w-full pl-12 pr-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:ring-2 focus:ring-orange-400 focus:outline-none transition-all shadow-sm" placeholder="Ex: Barraca do Sol">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1 ml-1">Endereço Completo (Para o GPS)</label>
                    <div class="relative group">
                        <i class="fa-solid fa-map-marker-alt absolute left-4 top-3.5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        <input type="text" id="input-address" required class="w-full pl-12 pr-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:ring-2 focus:ring-orange-400 focus:outline-none transition-all shadow-sm" placeholder="Rua, Número, Bairro - Cidade">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1 ml-1">Data e Hora</label>
                        <input type="datetime-local" id="input-datetime" required class="w-full px-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:ring-2 focus:ring-orange-400 focus:outline-none transition-all shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1 ml-1">Valor Total</label>
                        <input type="number" step="0.01" id="input-total" required class="w-full px-4 py-3 bg-white/60 border border-white/50 rounded-2xl focus:bg-white focus:ring-2 focus:ring-orange-400 focus:outline-none transition-all shadow-sm" placeholder="R$ 0,00">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1 ml-1">
                        <label class="block text-sm font-semibold text-gray-700">Limite de Jogadores</label>
                        <label class="flex items-center text-xs font-medium text-gray-600 cursor-pointer">
                            <input type="checkbox" id="check-unlimited" class="mr-1 w-4 h-4 text-orange-500 rounded border-gray-300" checked>
                            Aberto
                        </label>
                    </div>
                    <input type="number" min="2" id="input-limit" class="w-full px-4 py-3 bg-gray-100/50 border border-white/50 rounded-2xl focus:bg-white focus:ring-2 focus:ring-orange-400 focus:outline-none transition-all shadow-sm opacity-60" placeholder="Máximo de pessoas" disabled>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-4 px-4 rounded-2xl transition-all transform hover:scale-[1.02] hover:shadow-lg shadow-md mt-4 flex items-center justify-center gap-2 text-lg">
                    <i class="fa-solid fa-rocket"></i> Criar Vôlei do Italo
                </button>
            </form>
        </div>

        <div id="event-view" class="space-y-5 animate-fade-in">
            <div class="glass-card rounded-3xl p-6 relative">
                <button id="btn-share" class="absolute top-5 right-5 bg-white text-orange-500 hover:bg-orange-500 hover:text-white p-3 rounded-full transition-all duration-300 shadow-md transform hover:scale-110 w-12 h-12 flex items-center justify-center" title="Compartilhar Link">
                    <i class="fa-solid fa-share-nodes text-lg"></i>
                </button>

                <h2 class="text-2xl font-bold text-gray-800 mb-2 pr-14 leading-tight" id="display-location">Carregando...</h2>
                
                <div class="flex items-start justify-between gap-2 mb-4">
                    <p class="text-xs text-gray-500 flex-1 flex items-start gap-1" id="display-address-text">
                        <i class="fa-solid fa-location-dot mt-0.5"></i> <span>Endereço...</span>
                    </p>
                    <button id="btn-edit-address" class="text-gray-400 hover:text-orange-500 bg-white/50 hover:bg-white rounded-full w-6 h-6 flex items-center justify-center transition-all shadow-sm shrink-0" title="Editar endereço">
                        <i class="fa-solid fa-pen text-[10px]"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-4">
                    <a id="link-maps" target="_blank" class="flex items-center justify-center gap-2 bg-white/60 hover:bg-white border border-white/50 py-2 rounded-xl text-xs font-bold text-blue-600 transition-all shadow-sm">
                        <i class="fa-solid fa-map-location-dot"></i> Google Maps
                    </a>
                    <a id="link-waze" target="_blank" class="flex items-center justify-center gap-2 bg-white/60 hover:bg-white border border-white/50 py-2 rounded-xl text-xs font-bold text-cyan-500 transition-all shadow-sm">
                        <i class="fa-brands fa-waze text-base"></i> Waze
                    </a>
                </div>
                
                <div class="grid grid-cols-2 gap-4 text-sm mb-5 font-medium text-center">
                    <div class="bg-white/40 p-2.5 rounded-xl border border-white/40">
                        <p class="text-[10px] uppercase text-gray-500 mb-1">Data</p>
                        <span id="display-date">--/--/--</span>
                    </div>
                    <div class="bg-white/40 p-2.5 rounded-xl border border-white/40">
                        <p class="text-[10px] uppercase text-gray-500 mb-1">Horário</p>
                        <span id="display-time">--:--</span>
                    </div>
                </div>

                <div class="bg-gradient-to-r from-white/60 to-white/40 rounded-2xl p-4 flex justify-between items-center border border-white/60 shadow-sm">
                    <div>
                        <p class="text-[10px] text-gray-600 font-bold uppercase tracking-wider mb-1">Custo Total</p>
                        <p class="font-bold text-gray-800 text-lg" id="display-total-cost">R$ 0,00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-600 font-bold uppercase tracking-wider mb-1">Por Pessoa</p>
                        <p class="font-black text-green-600 text-2xl drop-shadow-sm" id="display-person-cost">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-6">
                <div class="flex justify-between items-end mb-5">
                    <h3 class="text-xl font-bold text-gray-800 flex items-center">
                        <i class="fa-solid fa-users text-orange-500 mr-2"></i> Jogadores
                    </h3>
                    <span id="display-count" class="bg-orange-500 text-white text-sm font-bold px-3 py-1.5 rounded-xl shadow-sm">0</span>
                </div>

                <div id="progress-container" class="w-full bg-white/50 rounded-full h-3 mb-5 border border-white/50 hidden overflow-hidden shadow-inner">
                    <div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>

                <ul id="participants-list" class="space-y-3 mb-6 max-h-[300px] overflow-y-auto pr-1"></ul>

                <div id="action-area" class="border-t border-gray-200/50 pt-5">
                    <div id="join-form-area" class="animate-pop">
                        <div class="flex gap-2">
                            <input type="text" id="input-name" class="flex-1 px-4 py-3 bg-white/80 border border-white/50 rounded-2xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:outline-none text-base shadow-sm font-medium" placeholder="Nome de quem vai...">
                            <button id="btn-join" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-5 rounded-2xl transition-all transform hover:scale-105 shadow-md flex items-center gap-2">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div id="full-area" class="hidden text-center p-4 bg-red-50/80 border border-red-200 rounded-2xl animate-pop">
                        <p class="text-red-600 font-bold text-lg flex items-center justify-center gap-2"><i class="fa-solid fa-lock"></i> Lista Cheia</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast fixed bottom-6 left-1/2 bg-gray-900/90 backdrop-blur-sm text-white px-5 py-3 rounded-2xl shadow-2xl text-sm z-50 flex items-center gap-3 font-medium border border-gray-700">
        <i class="fa-solid fa-bell text-orange-400 text-lg"></i>
        <span id="toast-msg">Mensagem</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, addDoc, getDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw",
            authDomain: "volei-3f30d.firebaseapp.com",
            projectId: "volei-3f30d",
            storageBucket: "volei-3f30d.firebasestorage.app",
            messagingSenderId: "969073040869",
            appId: "1:969073040869:web:c0f6005d98fae4144de30c"
        };

        let db, auth, currentUser, currentEventId;
        const urlParams = new URLSearchParams(window.location.search);
        currentEventId = urlParams.get('id');

        const viewLoading = document.getElementById('loading-view');
        const viewCreate = document.getElementById('create-view');
        const viewEvent = document.getElementById('event-view');
        const toastEl = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        if (currentEventId) loadEvent(currentEventId);
                        else showView('create');
                    }
                });
            } catch (error) {
                const icon = document.querySelector('#loading-view i');
                icon.classList.replace('fa-volleyball', 'fa-triangle-exclamation');
                document.querySelector('#loading-view p').innerText = "Ative o login anônimo no Firebase.";
            }
        };

        const showView = (view) => {
            viewLoading.style.display = 'none';
            viewCreate.style.display = 'none';
            viewEvent.style.display = 'none';
            if (view === 'create') viewCreate.style.display = 'block';
            if (view === 'event') viewEvent.style.display = 'block';
            if (view === 'loading') viewLoading.style.display = 'block';
        };

        const showToast = (msg) => {
            toastMsg.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 3000);
        };
        let toastTimeout;

        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);

        const checkUnlimited = document.getElementById('check-unlimited');
        const inputLimit = document.getElementById('input-limit');
        checkUnlimited.addEventListener('change', (e) => {
            inputLimit.disabled = e.target.checked;
            inputLimit.classList.toggle('opacity-60', e.target.checked);
            if(e.target.checked) inputLimit.value = '';
        });

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

            try {
                const docRef = await addDoc(collection(db, 'volei_events'), {
                    location: document.getElementById('input-location').value,
                    address: document.getElementById('input-address').value,
                    datetime: document.getElementById('input-datetime').value,
                    totalCost: parseFloat(document.getElementById('input-total').value),
                    playerLimit: checkUnlimited.checked ? 0 : parseInt(document.getElementById('input-limit').value),
                    participants: [],
                    createdAt: new Date().toISOString()
                });
                window.location.href = `?id=${docRef.id}`;
            } catch (err) {
                showToast("Erro ao salvar.");
                btn.disabled = false;
            }
        });

        const loadEvent = (eventId) => {
            showView('loading');
            onSnapshot(doc(db, 'volei_events', eventId), (snap) => {
                if (!snap.exists()) { showView('create'); return; }
                renderEvent(snap.data());
                showView('event');
            });
        };

        const renderEvent = (data) => {
            document.getElementById('display-location').textContent = data.location;
            document.querySelector('#display-address-text span').textContent = data.address;
            
            // Links GPS atualizados e corrigidos
            const encodedAddr = encodeURIComponent(data.address);
            document.getElementById('link-maps').href = `https://www.google.com/maps/search/?api=1&query=${encodedAddr}`;
            document.getElementById('link-waze').href = `https://waze.com/ul?q=${encodedAddr}`;

            const dt = new Date(data.datetime);
            document.getElementById('display-date').textContent = dt.toLocaleDateString('pt-BR');
            document.getElementById('display-time').textContent = dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('display-total-cost').textContent = formatCurrency(data.totalCost);

            const parts = data.participants || [];
            document.getElementById('display-person-cost').textContent = formatCurrency(data.totalCost / Math.max(1, parts.length));
            document.getElementById('display-count').textContent = data.playerLimit ? `${parts.length} / ${data.playerLimit}` : `${parts.length} pessoas`;

            const prog = document.getElementById('progress-container');
            if(data.playerLimit > 0) {
                prog.classList.remove('hidden');
                document.getElementById('progress-bar').style.width = `${(parts.length / data.playerLimit) * 100}%`;
            } else prog.classList.add('hidden');

            const listEl = document.getElementById('participants-list');
            listEl.innerHTML = parts.length ? '' : '<li class="text-center py-4 opacity-50 font-medium">Bora preencher essa lista!</li>';
            parts.forEach((p, i) => {
                const li = document.createElement('li');
                li.className = "animate-pop flex items-center justify-between p-3 bg-white/80 rounded-2xl border border-white/60 shadow-sm";
                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-xs shrink-0">${i+1}</div>
                        <span class="font-bold truncate text-gray-700">${p.name}</span>
                    </div>
                    <button data-entryid="${p.entryId}" class="btn-remove w-8 h-8 flex items-center justify-center text-red-400 hover:bg-red-50 rounded-full transition-colors shrink-0">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                listEl.appendChild(li);
            });

            const isFull = data.playerLimit > 0 && parts.length >= data.playerLimit;
            document.getElementById('join-form-area').classList.toggle('hidden', isFull);
            document.getElementById('full-area').classList.toggle('hidden', !isFull);
        };

        // Editar endereço
        document.getElementById('btn-edit-address').addEventListener('click', async () => {
            const currentAddress = document.querySelector('#display-address-text span').textContent;
            const newAddress = prompt("Atualize o endereço:", currentAddress);
            
            if (newAddress !== null && newAddress.trim() !== "" && newAddress.trim() !== currentAddress) {
                try {
                    await updateDoc(doc(db, 'volei_events', currentEventId), {
                        address: newAddress.trim()
                    });
                    showToast("Endereço atualizado!");
                } catch (error) {
                    showToast("Erro ao atualizar o endereço.");
                }
            }
        });

        document.getElementById('btn-join').addEventListener('click', async () => {
            const input = document.getElementById('input-name');
            if(!input.value.trim()) return showToast("Digite o nome.");
            const entryId = Date.now().toString(36) + Math.random().toString(36).substring(2);
            await updateDoc(doc(db, 'volei_events', currentEventId), {
                participants: arrayUnion({ entryId, id: currentUser.uid, name: input.value.trim(), ts: new Date().toISOString() })
            });
            input.value = '';
        });

        document.getElementById('participants-list').addEventListener('click', async (e) => {
            const btn = e.target.closest('.btn-remove');
            if(!btn) return;
            const snap = await getDoc(doc(db, 'volei_events', currentEventId));
            const p = snap.data().participants.find(x => x.entryId === btn.dataset.entryid);
            if(p) await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayRemove(p) });
        });

        document.getElementById('btn-share').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href);
            showToast("Link copiado! Manda pra galera.");
        });

        init();
    </script>
</body>
</html>
