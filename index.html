<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vôlei v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(170deg, #38bdf8 0%, #0ea5e9 30%, #fde047 70%, #f97316 100%); background-attachment: fixed; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #create-view, #event-view, #loading-view, #edit-modal { display: none; }
        .toast { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(150%) translateX(-50%); opacity: 0; z-index: 1000; }
        .toast.show { transform: translateY(0) translateX(-50%); opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 pb-12 overflow-x-hidden relative">

    <div class="fixed top-10 right-10 w-32 h-32 bg-yellow-300 rounded-full blur-2xl opacity-60 pointer-events-none animate-pulse-slow"></div>

    <header class="pt-10 pb-6 text-center relative z-10">
        <div class="flex items-center justify-center gap-3 px-4">
            <h1 class="text-3xl sm:text-4xl font-bold text-white drop-shadow-lg cursor-pointer transition-transform hover:scale-105 flex items-center" onclick="window.location.href=window.location.pathname">
                <i class="fa-solid fa-volleyball text-yellow-300 animate-bounce mr-3"></i> 
                <span id="main-title-text">Vôlei do Italo</span>
            </h1>
            <button id="btn-open-edit" class="hidden text-white/80 hover:text-white bg-white/20 w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm shrink-0">
                <i class="fa-solid fa-pen text-sm"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 relative z-10">
        
        <div id="loading-view" class="text-center py-20">
            <i class="fa-solid fa-volleyball animate-spin text-6xl text-white"></i>
            <p class="mt-6 text-white font-semibold uppercase tracking-widest">Sincronizando...</p>
        </div>

        <div id="create-view" class="space-y-6">
            <div class="glass-card rounded-3xl p-6 animate-fade-in border-orange-200/50 border-2 shadow-lg">
                <h3 class="text-xs font-bold text-orange-600 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> Já tem um código?
                </h3>
                <div class="flex gap-2">
                    <input type="text" id="input-search-id" class="flex-1 px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none uppercase font-mono text-sm tracking-widest" placeholder="EX: XS4567">
                    <button id="btn-search-id" class="bg-orange-500 text-white font-bold px-6 rounded-2xl shadow-md active:scale-95 transition-all">OK</button>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-7 animate-fade-in">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-3 uppercase tracking-tighter">Novo Jogo</h2>
                <form id="create-form" class="space-y-4">
                    <input type="text" id="input-location" required class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Nome do Jogo">
                    <input type="text" id="input-address" required class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Endereço">
                    <input type="text" id="input-group-link" class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-green-500 outline-none" placeholder="Link do Grupo de WhatsApp">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input type="datetime-local" id="input-datetime" required class="w-full px-4 py-3 border rounded-2xl text-sm focus:outline-none">
                        <input type="number" step="0.01" id="input-total" required class="w-full px-4 py-3 border rounded-2xl focus:outline-none" placeholder="Valor Total R$">
                    </div>

                    <div class="flex items-center justify-between px-1">
                        <label class="text-sm font-semibold text-gray-700">Limite de Jogadores</label>
                        <input type="checkbox" id="check-unlimited" checked class="w-6 h-6 text-orange-500 rounded-lg cursor-pointer">
                    </div>
                    <input type="number" min="2" id="input-limit" class="w-full px-4 py-3 bg-gray-100 border rounded-2xl opacity-60" placeholder="Máximo" disabled>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-4 rounded-2xl shadow-lg uppercase tracking-widest mt-4">Criar Partida</button>
                </form>
            </div>
        </div>

        <div id="event-view" class="space-y-5">
            <div class="glass-card rounded-3xl p-6 relative">
                <button id="btn-share" class="absolute top-5 right-5 bg-white text-orange-500 p-3 rounded-full shadow-md w-12 h-12 flex items-center justify-center z-10 active:scale-90"><i class="fa-solid fa-share-nodes"></i></button>
                
                <p class="text-sm text-gray-700 mb-5 pr-16 font-medium leading-tight" id="display-address-text">
                    <i class="fa-solid fa-location-dot text-orange-500 mr-1"></i> <span>Endereço...</span>
                </p>

                <div class="flex items-center gap-3 mb-6 overflow-x-auto pb-2 no-scrollbar">
                    <div class="h-11 px-4 bg-orange-100 border border-orange-200 rounded-2xl flex flex-col items-center justify-center shrink-0 shadow-sm">
                        <span class="text-[8px] uppercase font-bold text-orange-400 leading-none">CÓDIGO</span>
                        <span class="text-xs font-mono font-black text-orange-700 tracking-tighter" id="display-game-id">--0000</span>
                    </div>

                    <a id="link-maps" target="_blank" class="w-11 h-11 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100 text-blue-600 active:scale-90 shrink-0"><i class="fa-solid fa-map-location-dot text-lg"></i></a>
                    <a id="link-waze" target="_blank" class="w-11 h-11 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100 text-cyan-500 active:scale-90 shrink-0"><i class="fa-brands fa-waze text-xl"></i></a>
                    <button id="btn-calendar" class="w-11 h-11 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-100 text-orange-500 active:scale-90 shrink-0"><i class="fa-regular fa-calendar-plus text-lg"></i></button>
                </div>

                <div class="bg-white/40 rounded-2xl p-4 flex justify-between items-center border border-white/50">
                    <div><p class="text-[10px] uppercase font-bold text-gray-500">Total</p><p class="font-bold text-gray-800" id="display-total-cost">R$ 0,00</p></div>
                    <div class="text-right"><p class="text-[10px] uppercase font-bold text-gray-500">Por Pessoa</p><p class="font-black text-green-600 text-2xl" id="display-person-cost">R$ 0,00</p></div>
                </div>
            </div>

            <div class="flex p-1 bg-white/30 backdrop-blur-lg rounded-2xl border border-white/40 shadow-sm">
                <button id="tab-btn-players" class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-white text-orange-600 shadow-sm transition-all">Jogadores</button>
                <button id="tab-btn-score" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white transition-all">Placar</button>
            </div>

            <div id="tab-content-players" class="glass-card rounded-3xl p-6 block animate-pop">
                <div class="flex justify-between items-end mb-4"><h3 class="text-xl font-bold text-gray-800">Lista de Presença</h3><span id="display-count" class="bg-orange-500 text-white text-sm font-bold px-3 py-1 rounded-xl shadow-md">0</span></div>
                <div id="progress-container" class="w-full bg-white/50 rounded-full h-3 mb-5 hidden overflow-hidden shadow-inner"><div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full"></div></div>
                <ul id="participants-list" class="space-y-2 mb-6 max-h-[300px] overflow-y-auto pr-1"></ul>
                <div id="action-area" class="border-t pt-5">
                    <div id="join-form-area" class="flex gap-2">
                        <input type="text" id="input-name" class="flex-1 px-4 py-3 bg-white border-0 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none shadow-inner" placeholder="Nome de quem vai...">
                        <button id="btn-join" class="bg-green-500 text-white font-bold px-6 rounded-2xl shadow-lg active:scale-95 transition-transform"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <a id="btn-join-group" target="_blank" class="hidden w-full mt-4 bg-green-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-xl hover:brightness-110 transition-all border-b-4 border-green-700 uppercase text-[10px] tracking-widest"><i class="fa-brands fa-whatsapp text-xl"></i> GRUPO DO ZAP</a>
                </div>
            </div>

            <div id="tab-content-score" class="glass-card rounded-3xl p-6 hidden text-center animate-pop">
                <div class="flex justify-between items-center mb-6 bg-white/60 p-3 rounded-2xl border border-white/50"><span class="text-xs font-bold text-gray-600 uppercase tracking-widest">Set Fecha em:</span><select id="config-max-score" class="bg-white border rounded-xl px-2 py-1 text-sm font-black text-orange-600 focus:outline-none"><option value="15">15 pts</option><option value="21">21 pts</option><option value="25">25 pts</option></select></div>
                <div class="flex justify-between items-stretch gap-3">
                    <div class="flex-1 bg-white/60 rounded-2xl p-4 shadow-sm border border-white/40"><div class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Sets: <span id="sets-a" class="text-orange-600 text-sm">0</span></div><input type="text" id="name-team-a" class="w-full text-center bg-transparent font-bold text-xs border-b mb-3 focus:outline-none uppercase" value="TIME A"><div class="text-6xl font-black text-gray-800 my-4" id="score-a">0</div><div class="flex gap-2"><button onclick="updateScore('A', -1)" class="flex-1 bg-red-100 text-red-600 py-3 rounded-xl">-</button><button onclick="updateScore('A', 1)" class="flex-[2] bg-green-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">+</button></div></div>
                    <div class="flex items-center text-gray-300 font-black">X</div>
                    <div class="flex-1 bg-white/60 rounded-2xl p-4 shadow-sm border border-white/40"><div class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Sets: <span id="sets-b" class="text-orange-600 text-sm">0</span></div><input type="text" id="name-team-b" class="w-full text-center bg-transparent font-bold text-xs border-b mb-3 focus:outline-none uppercase" value="TIME B"><div class="text-6xl font-black text-gray-800 my-4" id="score-b">0</div><div class="flex gap-2"><button onclick="updateScore('B', -1)" class="flex-1 bg-red-100 text-red-600 py-3 rounded-xl">-</button><button onclick="updateScore('B', 1)" class="flex-[2] bg-blue-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">+</button></div></div>
                </div>
                <div class="mt-6"><button onclick="resetScore()" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-red-500 transition-colors"><i class="fa-solid fa-rotate-left mr-1"></i> Zerar Partida</button></div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);">
        <div class="glass-card w-full max-w-sm rounded-3xl p-6 relative animate-pop shadow-2xl">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-gear text-orange-500"></i> Ajustar Detalhes</h3>
            <div class="space-y-3">
                <input type="text" id="modal-edit-title" class="w-full px-4 py-3 border rounded-2xl focus:outline-none" placeholder="Nome do Jogo">
                <input type="text" id="modal-edit-address" class="w-full px-4 py-3 border rounded-2xl focus:outline-none" placeholder="Endereço">
                <input type="text" id="modal-edit-group" class="w-full px-4 py-3 border rounded-2xl focus:outline-none" placeholder="Link do Grupo">
                <div class="flex gap-2 pt-2"><button id="modal-cancel" class="flex-1 py-3 font-bold text-gray-500">Voltar</button><button id="modal-save" class="flex-[2] bg-green-500 text-white font-bold py-3 rounded-2xl shadow-lg">Salvar</button></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast fixed bottom-6 left-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-full shadow-2xl text-sm flex items-center gap-3 font-medium"><i class="fa-solid fa-circle-check text-green-400"></i><span id="toast-msg">Mensagem</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA3RQucgd5vMeJzZgZnC4Zim9hkFVVWXnw", authDomain: "volei-3f30d.firebaseapp.com", projectId: "volei-3f30d", storageBucket: "volei-3f30d.firebasestorage.app", messagingSenderId: "969073040869", appId: "1:969073040869:web:c0f6005d98fae4144de30c" };
        let db, auth, currentUser, currentEventId, localEventData;
        const urlParams = new URLSearchParams(window.location.search);
        
        // --- CORREÇÃO DE COMPATIBILIDADE ---
        const rawId = urlParams.get('id');
        if (rawId) {
            // Se for padrão novo (6 dígitos), deixa maiúsculo. 
            // Se for padrão antigo (Firebase longo), deixa original.
            currentEventId = (rawId.length === 6) ? rawId.toUpperCase() : rawId;
        }

        const viewLoading = document.getElementById('loading-view');
        const viewCreate = document.getElementById('create-view');
        const viewEvent = document.getElementById('event-view');
        const toastEl = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        function generateShortId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            return chars[Math.floor(Math.random() * 26)] + chars[Math.floor(Math.random() * 26)] + Math.floor(1000 + Math.random() * 9000);
        }

        document.getElementById('btn-search-id').onclick = () => {
            const id = document.getElementById('input-search-id').value.trim();
            if(id) window.location.href = `?id=${id}`;
        };

        document.getElementById('btn-calendar').onclick = () => {
            if(!localEventData) return;
            const startStr = localEventData.datetime.replace(/-/g, '').replace(/:/g, '') + '00';
            const googleUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(localEventData.location)}&dates=${startStr}/${startStr}&details=${encodeURIComponent('Link: '+window.location.href)}&location=${encodeURIComponent(localEventData.address)}`;
            window.open(googleUrl, '_blank');
        };

        window.updateScore = async (team, amt) => {
            if(!currentEventId || !localEventData) return;
            const field = team === 'A' ? 'scoreA' : 'scoreB';
            const setField = team === 'A' ? 'setsA' : 'setsB';
            let cur = (localEventData[field] || 0) + amt;
            const max = parseInt(document.getElementById('config-max-score').value);
            const other = team === 'A' ? (localEventData.scoreB || 0) : (localEventData.scoreA || 0);
            if(cur >= max && (cur - other) >= 2) { await updateDoc(doc(db, 'volei_events', currentEventId), { scoreA:0, scoreB:0, [setField]: increment(1) }); }
            else { await updateDoc(doc(db, 'volei_events', currentEventId), { [field]: Math.max(0, cur) }); }
        };

        window.resetScore = async () => { if(confirm("Zerar partida?")) await updateDoc(doc(db, 'volei_events', currentEventId), { scoreA:0, scoreB:0, setsA:0, setsB:0 }); };
        window.removePlayer = async (id) => { const p = localEventData.participants.find(x => x.entryId === id); await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayRemove(p) }); };

        document.getElementById('btn-open-edit').onclick = () => { document.getElementById('modal-edit-title').value = localEventData.location; document.getElementById('modal-edit-address').value = localEventData.address; document.getElementById('modal-edit-group').value = localEventData.groupLink || ''; document.getElementById('edit-modal').style.display = 'flex'; };
        document.getElementById('modal-cancel').onclick = () => document.getElementById('edit-modal').style.display = 'none';
        document.getElementById('modal-save').onclick = async () => { await updateDoc(doc(db, 'volei_events', currentEventId), { location: document.getElementById('modal-edit-title').value, address: document.getElementById('modal-edit-address').value, groupLink: document.getElementById('modal-edit-group').value }); document.getElementById('edit-modal').style.display = 'none'; };

        document.getElementById('btn-join').onclick = async () => {
            const n = document.getElementById('input-name').value.trim();
            if(!n) return;
            const entryId = Math.random().toString(36).substr(2, 9);
            await updateDoc(doc(db, 'volei_events', currentEventId), { participants: arrayUnion({ entryId, name: n }) });
            document.getElementById('input-name').value = '';
            showToast("Presença confirmada! 🏐");
        };

        const init = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => {
                if(!u) return; currentUser = u;
                if(currentEventId) {
                    onSnapshot(doc(db, 'volei_events', currentEventId), (s) => {
                        if(!s.exists()) { showToast("Código inválido!"); setTimeout(() => window.location.href = window.location.pathname, 1500); return; }
                        localEventData = s.data(); renderEvent(localEventData);
                        viewLoading.style.display = 'none'; viewEvent.style.display = 'block';
                        document.getElementById('btn-open-edit').classList.remove('hidden');
                    });
                } else { viewLoading.style.display = 'none'; viewCreate.style.display = 'block'; }
            });
        };

        const renderEvent = (d) => {
            document.getElementById('main-title-text').innerText = d.location;
            document.querySelector('#display-address-text span').innerText = d.address;
            document.getElementById('display-game-id').innerText = currentEventId;
            const enc = encodeURIComponent(d.address);
            document.getElementById('link-maps').href = `http://googleusercontent.com/maps.google.com/8{enc}`;
            document.getElementById('link-waze').href = `https://waze.com/ul?q=${enc}`;
            const btnGroup = document.getElementById('btn-join-group');
            if(d.groupLink) { btnGroup.href = d.groupLink; btnGroup.classList.remove('hidden'); } else { btnGroup.classList.add('hidden'); }
            
            document.getElementById('display-total-cost').innerText = `R$ ${d.totalCost.toFixed(2)}`;
            const p = d.participants || [];
            document.getElementById('display-person-cost').innerText = `R$ ${(d.totalCost / Math.max(1, p.length)).toFixed(2)}`;
            document.getElementById('display-count').innerText = d.playerLimit ? `${p.length}/${d.playerLimit}` : p.length;
            if(d.playerLimit) { document.getElementById('progress-container').classList.remove('hidden'); document.getElementById('progress-bar').style.width = Math.min(100, (p.length / d.playerLimit * 100)) + '%'; }
            document.getElementById('participants-list').innerHTML = p.map(u => `<li class="flex items-center justify-between p-3 bg-white/80 rounded-2xl shadow-sm border border-white/50 animate-pop"><span class="font-bold text-gray-700 uppercase text-xs ml-2">${u.name}</span><button onclick="removePlayer('${u.entryId}')" class="text-red-300 p-2"><i class="fa-solid fa-trash-can"></i></button></li>`).join('');
            document.getElementById('score-a').innerText = d.scoreA || 0; document.getElementById('score-b').innerText = d.scoreB || 0;
            document.getElementById('sets-a').innerText = d.setsA || 0; document.getElementById('sets-b').innerText = d.setsB || 0;
        };

        const tab = (t) => {
            const isP = t === 'players';
            document.getElementById('tab-content-players').classList.toggle('hidden', !isP);
            document.getElementById('tab-content-score').classList.toggle('hidden', isP);
            document.getElementById('tab-btn-players').className = isP ? 'flex-1 py-2.5 rounded-xl text-sm font-bold bg-white text-orange-600 shadow-sm' : 'flex-1 py-2.5 rounded-xl text-sm font-bold text-white';
            document.getElementById('tab-btn-score').className = !isP ? 'flex-1 py-2.5 rounded-xl text-sm font-bold bg-white text-orange-600 shadow-sm' : 'flex-1 py-2.5 rounded-xl text-sm font-bold text-white';
        };
        document.getElementById('tab-btn-players').onclick = () => tab('players');
        document.getElementById('tab-btn-score').onclick = () => tab('score');

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true;
            const shortId = generateShortId();
            try {
                await setDoc(doc(db, 'volei_events', shortId), {
                    location: document.getElementById('input-location').value, address: document.getElementById('input-address').value,
                    groupLink: document.getElementById('input-group-link').value, totalCost: parseFloat(document.getElementById('input-total').value),
                    playerLimit: document.getElementById('check-unlimited').checked ? 0 : parseInt(document.getElementById('input-limit').value),
                    participants: [], scoreA:0, scoreB:0, setsA:0, setsB:0, maxScore: 21, datetime: document.getElementById('input-datetime').value
                });
                window.location.href = `?id=${shortId}`;
            } catch(err) { showToast("Erro ao criar."); btn.disabled = false; }
        };

        document.getElementById('btn-share').onclick = () => { navigator.clipboard.writeText(window.location.href); showToast("Link do Jogo Copiado! 🏐"); };
        const showToast = (m) => { toastMsg.innerText = m; toastEl.classList.add('show'); setTimeout(() => toastEl.classList.remove('show'), 3000); };
        init();
    </script>
</body>
</html>
